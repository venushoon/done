<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>다했어요! 보드 (Ultimate Edition)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" />

<style>
    /* ==========================================
       CSS Variables & Reset
    ========================================== */
    :root {
        --ink: #0f172a;
        --ink-light: #475569;
        --paper: #f8fafc;
        --surface: #ffffff;
        --navy: #1e3a8a;
        --navy-light: #eff6ff;
        --accent: #e11d48;
        --success: #10b981;
        --warning: #f59e0b;
        --border: #e2e8f0;
        
        --shadow-sm: 0 2px 4px rgba(0,0,0,0.02);
        --shadow-md: 0 4px 12px rgba(0,0,0,0.05);
        --shadow-lg: 0 15px 35px rgba(15, 23, 42, 0.08);
        --shadow-xl: 0 25px 50px rgba(15, 23, 42, 0.15);
        
        --radius-sm: 8px;
        --radius-md: 16px;
        --radius-lg: 24px;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body, html {
        margin: 0; padding: 0; height: 100%; overflow: hidden;
        font-family: 'Pretendard', 'DM Sans', sans-serif;
        background: var(--paper); color: var(--ink);
        background-image: radial-gradient(#cbd5e1 1.2px, transparent 1.2px); background-size: 24px 24px;
    }

    body.is-dragging { user-select: none; -webkit-user-select: none; }

    #app { display: flex; flex-direction: column; height: 100vh; position: relative; }

    /* ==========================================
       Header
    ========================================== */
    header {
        display: flex; justify-content: space-between; align-items: center;
        padding: 16px 30px; background: rgba(255, 255, 255, 0.85);
        backdrop-filter: blur(12px); border-bottom: 1px solid var(--border);
        z-index: 50; flex-shrink: 0; height: 76px;
    }
    .brand { display: flex; align-items: center; gap: 12px; }
    .brand-icon { font-size: 2rem; }
    .brand-text h1 { margin: 0; font-size: 1.4rem; font-weight: 800; color: var(--navy); letter-spacing: -0.5px; }
    .brand-text p { margin: 0; font-size: 0.85rem; color: var(--ink-light); font-weight: 600; }
    
    .mode-toggle { display: flex; background: var(--paper); border-radius: 100px; padding: 4px; border: 1px solid var(--border); }
    .mode-btn {
        padding: 8px 20px; border: none; background: transparent; border-radius: 100px;
        font-weight: 700; color: var(--ink-light); cursor: pointer; transition: 0.2s; font-size: 0.95rem;
    }
    .mode-btn.active { background: var(--surface); color: var(--navy); box-shadow: var(--shadow-sm); }

    /* ==========================================
       USER VIEW (Student Board)
    ========================================== */
    #user-view { flex-grow: 1; display: flex; overflow: hidden; position: relative; }
    .board-main { flex-grow: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; width: 100%; }

    .task-container {
        flex-grow: 1; padding: 30px; padding-bottom: 30px;
        overflow-x: auto; overflow-y: hidden;
        display: flex; gap: 24px; align-items: flex-start; justify-content: center;
    }
    .task-container::-webkit-scrollbar { width: 10px; height: 10px; }
    .task-container::-webkit-scrollbar-track { background: transparent; }
    .task-container::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; border: 3px solid var(--paper); }

    .task-col {
        flex: 1 1 300px; min-width: 300px; max-width: 700px;
        background: rgba(255, 255, 255, 0.85); border: 2px solid var(--surface);
        border-radius: var(--radius-lg); box-shadow: var(--shadow-md);
        display: flex; flex-direction: column; position: relative; 
        transition: box-shadow 0.2s ease, border-color 0.2s ease;
    }
    .task-container[data-count="1"] .task-col { margin: 0 auto; }
    .task-col.drag-over { border-color: var(--navy); box-shadow: inset 0 0 0 2px var(--navy), var(--shadow-lg); background: var(--surface); }
    
    .task-header { padding: 20px 24px; border-bottom: 2px dashed var(--border); display: flex; align-items: center; gap: 15px; flex-shrink: 0; }
    .task-icon { width: 48px; height: 48px; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; flex-shrink: 0; box-shadow: inset 0 0 0 1px rgba(0,0,0,0.05); position: relative;}
    
    .task-info { flex-grow: 1; }
    .task-title { font-size: 1.1rem; font-weight: 800; margin: 0; color: var(--ink); line-height: 1.3; }
    
    .progress-wrap { position: relative; width: 42px; height: 42px; flex-shrink: 0; }
    .progress-svg { transform: rotate(-90deg); width: 100%; height: 100%; }
    .progress-bg { fill: none; stroke: var(--paper); stroke-width: 4; }
    .progress-fill { fill: none; stroke: var(--success); stroke-width: 4; stroke-linecap: round; transition: stroke-dashoffset 0.5s ease; }
    .progress-text { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: 800; color: var(--ink); }

    .task-container[data-count="1"] .task-icon { width: 76px; height: 76px; font-size: 3rem; border-radius: 20px; }
    .task-container[data-count="1"] .task-title { font-size: 1.6rem; }
    .task-container[data-count="1"] .progress-wrap { width: 64px; height: 64px; }
    .task-container[data-count="1"] .progress-text { font-size: 1.1rem; }
    .task-container[data-count="2"] .task-icon { width: 60px; height: 60px; font-size: 2.2rem; border-radius: 16px; }
    .task-container[data-count="2"] .task-title { font-size: 1.3rem; }
    .task-container[data-count="2"] .progress-wrap { width: 52px; height: 52px; }
    .task-container[data-count="2"] .progress-text { font-size: 0.9rem; }

    .task-body {
        padding: 24px; flex-grow: 1; overflow-y: auto; overflow-x: hidden;
        display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 12px; align-content: start;
        min-height: 100px;
    }
    .task-body::-webkit-scrollbar { width: 6px; }
    .task-body::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 6px; }
    
    .done-chip {
        background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-md);
        padding: 14px 8px; display: flex; flex-direction: column; align-items: center; gap: 8px;
        box-shadow: var(--shadow-sm); cursor: pointer; position: relative; overflow: hidden;
    }
    .done-chip.chip-enter { animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

    body:not(.is-dragging) .done-chip:hover::after {
        content: '✕ 취소'; position: absolute; inset: 0; background: rgba(225, 29, 72, 0.9); color: white;
        display: flex; align-items: center; justify-content: center; font-size: 0.9rem; font-weight: bold; animation: fadeIn 0.2s;
    }
    .done-emoji { font-size: 2.3rem; line-height: 1.2; }
    .done-name { font-size: 0.95rem; font-weight: 700; color: var(--ink); white-space: nowrap; }

    .student-point-badge {
        position: absolute; top: 4px; right: 4px; background: var(--warning); color: white;
        font-size: 0.7rem; font-weight: 800; padding: 2px 5px; border-radius: 10px;
        min-width: 18px; text-align: center; box-shadow: var(--shadow-sm); display: none; 
    }
    body.show-points .student-point-badge { display: block; } 

    /* ==========================================
       FLOATING STUDENT ROSTER (Mac OS Dock Style)
    ========================================== */
    #floating-roster {
        position: fixed; z-index: 900;
        background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
        border: 1px solid var(--border); border-radius: var(--radius-lg);
        box-shadow: var(--shadow-xl); display: flex; overflow: hidden;
        transition: left 0.4s cubic-bezier(0.16, 1, 0.3, 1), top 0.4s cubic-bezier(0.16, 1, 0.3, 1), transform 0.4s;
    }
    .roster-header {
        background: var(--surface); display: flex; align-items: center; justify-content: space-between;
        cursor: grab; user-select: none; touch-action: none;
    }
    .roster-header:active { cursor: grabbing; background: var(--paper); }
    .roster-title-area { display: flex; align-items: center; gap: 8px; }
    .roster-title { font-weight: 800; color: var(--navy); margin: 0; font-size: 1rem; }
    .roster-count { font-size: 0.75rem; color: var(--surface); font-weight: 700; background: var(--navy); padding: 4px 10px; border-radius: 100px; }
    .roster-controls { display: flex; gap: 8px; }
    .roster-btn { width: 28px; height: 28px; border: none; background: var(--paper); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--ink-light); font-weight: bold; font-size: 1rem; transition: 0.2s; }
    .roster-btn:hover { background: var(--border); color: var(--ink); }

    #floating-roster[data-layout="vertical"] { flex-direction: column; width: auto; max-width: 230px; max-height: 80vh; }
    #floating-roster[data-layout="vertical"] .roster-header { padding: 14px 15px; border-bottom: 1px solid var(--border); }
    #floating-roster[data-layout="vertical"] .roster-title-area { flex-direction: row; align-items: center; gap: 8px; }
    #floating-roster[data-layout="vertical"] .dock-container { 
        display: grid; grid-template-columns: repeat(2, 1fr); padding: 12px; gap: 8px; overflow-y: auto; overflow-x: hidden; justify-items: center;
    }

    #floating-roster[data-layout="horizontal"] { flex-direction: column; width: 95vw; max-width: 1200px; height: auto; }
    #floating-roster[data-layout="horizontal"] .roster-header { padding: 8px 18px; border-bottom: 1px solid var(--border); flex-direction: row; }
    #floating-roster[data-layout="horizontal"] .roster-title-area { flex-direction: row; align-items: center; }
    #floating-roster[data-layout="horizontal"] .dock-container { 
        display: grid; grid-template-columns: repeat(10, 1fr);
        padding: 10px 12px; gap: 6px; overflow-x: hidden; overflow-y: auto; justify-items: center;
    }

    .dock-container::-webkit-scrollbar { width: 6px; height: 6px; }
    .dock-container::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

    .draggable-chip {
        background: var(--surface); border: 1px solid var(--border); border-radius: 10px; 
        padding: 6px 6px 8px; display: flex; flex-direction: column; align-items: center; gap: 4px; font-weight: 700; font-size: 0.78rem; 
        cursor: grab; user-select: none; touch-action: none; transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
        box-shadow: var(--shadow-sm); width: 100%; max-width: 72px; flex-shrink: 0; position: relative;
    }
    .dock-emoji-wrap {
        width: 32px; height: 32px; border-radius: 50%;
        display: flex; align-items: center; justify-content: center;
        box-shadow: inset 0 0 0 1px rgba(0,0,0,0.05); pointer-events: none;
    }
    body:not(.is-dragging) .draggable-chip:hover { 
        background: var(--surface); border-color: var(--navy); 
        transform: scale(1.15) translateY(-4px); z-index: 10; box-shadow: 0 8px 16px rgba(0,0,0,0.1); 
    }
    .draggable-chip:active { cursor: grabbing; transform: scale(1); opacity: 0.5; }
    .dock-emoji { font-size: 1.5rem; pointer-events: none; line-height: 1.2; }
    .dock-name { pointer-events: none; white-space: nowrap; color: var(--ink); font-size: 0.78rem; }

    .ghost-chip {
        position: fixed; pointer-events: none !important; z-index: 9999;
        background: var(--surface); border: 2px solid var(--navy); border-radius: 12px;
        padding: 10px 16px; display: flex; flex-direction: column; align-items: center; gap: 6px; font-weight: 700; font-size: 0.95rem;
        box-shadow: var(--shadow-lg); opacity: 0.95; transform: translate(-50%, -50%) scale(1.05); color: var(--navy);
    }
    .ghost-chip .dock-emoji-wrap { width: 44px; height: 44px; }
    .ghost-chip .dock-emoji { font-size: 2rem; line-height: 1.2; }

    /* ==========================================
       FLOATING TIMER
    ========================================== */
    #floating-timer {
        position: fixed; z-index: 1000;
        background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(12px); border: 1px solid var(--border); border-radius: 100px;
        box-shadow: var(--shadow-md); padding: 6px 16px 6px 10px;
        display: flex; align-items: center; gap: 16px;
    }
    .drag-handle { cursor: grab; padding: 10px; color: var(--ink-light); font-size: 1.2rem; line-height: 0.5; user-select: none; touch-action: none;}
    .drag-handle:active { cursor: grabbing; color: var(--navy); }
    .time-display { font-family: 'DM Sans', sans-serif; font-size: 2.2rem; font-weight: 800; color: var(--ink); letter-spacing: -1px; font-variant-numeric: tabular-nums; cursor: pointer; }
    .time-display.warning { color: var(--accent); animation: pulse 1s infinite; }
    .timer-controls { display: flex; gap: 6px; align-items: center; }
    .timer-btn { width: 36px; height: 36px; border: none; border-radius: 50%; background: var(--paper); display: flex; align-items: center; justify-content: center; cursor: pointer; font-weight: bold; color: var(--ink-light); transition: 0.2s; }
    .timer-btn:hover { background: var(--border); color: var(--ink); }
    .play-pause-btn { width: 44px; height: 44px; background: var(--navy); color: white; box-shadow: 0 4px 10px rgba(30, 58, 138, 0.3); }
    .play-pause-btn:hover { background: #172554; }
    .play-pause-btn svg { width: 18px; height: 18px; fill: currentColor; }

    /* ==========================================
       ADMIN VIEW
    ========================================== */
    #admin-view { flex-grow: 1; display: none; background: var(--paper); overflow: hidden; }
    .admin-container { display: flex; height: 100%; width: 100%; max-width: 1600px; margin: 0 auto; }
    .admin-sidebar { width: 260px; background: var(--surface); border-right: 1px solid var(--border); padding: 20px 0; display: flex; flex-direction: column; gap: 5px; flex-shrink: 0; }
    .admin-tab-btn { padding: 16px 24px; text-align: left; background: transparent; border: none; font-size: 1.05rem; font-weight: 700; color: var(--ink-light); cursor: pointer; transition: 0.2s; border-left: 4px solid transparent; display: flex; align-items: center; gap: 10px; }
    .admin-tab-btn:hover { background: var(--paper); color: var(--ink); }
    .admin-tab-btn.active { background: var(--navy-light); color: var(--navy); border-left-color: var(--navy); }
    .admin-content { flex-grow: 1; padding: 40px; overflow-y: auto; }
    .tab-pane { display: none; animation: fadeIn 0.3s; max-width: 1000px; }
    .tab-pane.active { display: block; }
    .panel-title { font-size: 1.4rem; font-weight: 800; color: var(--navy); margin: 0 0 24px 0; display: flex; justify-content: space-between; align-items: center; }
    .admin-card { background: var(--surface); border-radius: var(--radius-lg); padding: 24px; box-shadow: var(--shadow-sm); border: 1px solid var(--border); margin-bottom: 24px; }
    .task-edit-item { display: flex; gap: 10px; align-items: center; background: var(--paper); padding: 12px; border-radius: var(--radius-md); margin-bottom: 8px; }
    .icon-input { width: 50px; text-align: center; font-size: 1.5rem; }
    .text-input { flex-grow: 1; border: 1px solid var(--border); padding: 12px; border-radius: var(--radius-sm); outline: none; font-size: 0.95rem; font-family: inherit; }
    .text-input:focus { border-color: var(--navy); }
    .btn-primary { background: var(--navy); color: white; border: none; padding: 12px 20px; border-radius: var(--radius-sm); font-weight: 700; cursor: pointer; white-space: nowrap; transition: 0.2s;}
    .btn-primary:hover { background: #172554; }
    .btn-danger-sm { background: #ffe4e6; color: var(--accent); border: none; width: 36px; height: 36px; border-radius: var(--radius-sm); cursor: pointer; font-weight: bold; transition: 0.2s;}
    .btn-danger-sm:hover { background: var(--accent); color: white; }

    .point-select { padding: 10px; border: 1px solid var(--border); border-radius: var(--radius-sm); outline: none; font-size: 0.95rem; font-family: inherit; font-weight: bold; color: var(--ink); background: var(--paper); cursor: pointer;}
    .point-select:focus { border-color: var(--navy); }

    .emoji-picker-container { position: relative; display: flex; align-items: stretch; }
    .emoji-selector-btn { width: 60px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--surface); font-size: 1.5rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: border-color 0.2s; }
    .emoji-selector-btn:hover { border-color: var(--navy); }
    .emoji-picker { position: absolute; top: calc(100% + 10px); left: 0; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-md); box-shadow: var(--shadow-lg); padding: 12px; display: none; grid-template-columns: repeat(5, 1fr); gap: 6px; z-index: 100; }
    .emoji-picker.show { display: grid; animation: fadeIn 0.2s; }
    .emoji-option { width: 42px; height: 42px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; cursor: pointer; border-radius: 8px; transition: background 0.2s; }
    .emoji-option:hover { background: var(--paper); }
    
    .toggle-switch { position: relative; display: inline-block; width: 50px; height: 24px; }
    .toggle-switch input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #cbd5e1; transition: .4s; border-radius: 34px; }
    .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
    input:checked + .slider { background-color: var(--success); }
    input:checked + .slider:before { transform: translateX(26px); }

    .insight-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(400px, 1fr)); gap: 24px; }
    .insight-box { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; box-shadow: var(--shadow-sm); }
    .insight-header { background: var(--paper); padding: 16px 20px; font-weight: 800; font-size: 1.1rem; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between;}
    .status-section { padding: 16px 20px; border-bottom: 1px dashed var(--border); }
    .status-section:last-child { border-bottom: none; }
    .status-title { font-size: 0.9rem; font-weight: 800; color: var(--ink-light); margin-bottom: 10px; }
    .chip-wrap { display: flex; flex-wrap: wrap; gap: 8px; }
    .chip { padding: 6px 12px; border-radius: 100px; font-size: 0.85rem; font-weight: 700; display: flex; align-items: center; gap: 4px; }
    .chip.done { background: #ecfdf5; color: #047857; border: 1px solid #a7f3d0; }
    .chip.missing { background: #fff1f2; color: var(--accent); border: 1px solid #fecdd3; }
    
    .badge { display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: 8px; font-size: 0.9rem; margin: 0 6px 6px 0; border: 1px solid transparent; font-weight: 700;}
    .badge.done { background: #ecfdf5; color: #047857; border-color: #a7f3d0; }
    .badge.missing { background: var(--paper); color: var(--ink-light); border-color: var(--border); opacity: 0.75; }

    /* 🟢 세련된 아코디언 학생 카드 리스트 */
    .student-record-list { display: flex; flex-direction: column; gap: 12px; }
    .student-record-card {
        background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg);
        box-shadow: var(--shadow-sm); overflow: hidden; transition: box-shadow 0.2s;
    }
    .student-record-card:hover { box-shadow: var(--shadow-md); }
    .sr-header {
        display: flex; align-items: center; padding: 16px 20px; cursor: pointer; gap: 15px; transition: background 0.2s;
    }
    .sr-header:hover { background: var(--paper); }
    .sr-profile { font-weight: 800; font-size: 1.1rem; color: var(--ink); width: 140px; display: flex; align-items: center; gap: 8px; }
    .sr-points-ctrl { display: flex; align-items: center; gap: 8px; background: var(--paper); padding: 4px 8px; border-radius: 100px; border: 1px solid var(--border); }
    .sr-points-ctrl button { border: none; background: var(--surface); border-radius: 50%; width: 26px; height: 26px; font-weight: bold; color: var(--navy); cursor: pointer; box-shadow: var(--shadow-sm); transition: 0.1s;}
    .sr-points-ctrl button:hover { background: var(--navy); color: white; }
    .sr-points-ctrl button:active { transform: scale(0.9); }
    .sr-points-ctrl span { font-weight: 800; font-size: 1.1rem; color: var(--warning); min-width: 24px; text-align: center; }
    .sr-badges { flex-grow: 1; display: flex; flex-wrap: wrap; gap: 6px; }
    .sr-chevron { color: var(--ink-light); transition: transform 0.3s; font-size: 0.9rem; }
    .sr-header.open .sr-chevron { transform: rotate(180deg); }
    .sr-body { padding: 0 20px; max-height: 0; opacity: 0; overflow: hidden; transition: all 0.3s ease-in-out; background: var(--paper); }
    .sr-body.open { padding: 20px; max-height: 800px; opacity: 1; border-top: 1px dashed var(--border); overflow-y: auto;}
    
    /* 190일 누적용 태그 스타일 */
    .task-history-list { display: flex; flex-wrap: wrap; gap: 10px; }
    .task-history-item { 
        background: var(--surface); padding: 10px 16px; border-radius: 12px; font-size: 0.95rem; font-weight: 700; 
        display: flex; align-items: center; gap: 8px; border: 1px solid var(--border); box-shadow: var(--shadow-sm);
    }

    @keyframes popIn { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    @keyframes fadeIn { 0% { opacity: 0; } 100% { opacity: 1; } }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    
    .confetti-canvas { position: absolute; inset: 0; pointer-events: none; z-index: 10; border-radius: var(--radius-lg); }

    @media (max-width: 768px) {
        header { flex-direction: column; gap: 15px; padding: 15px; height: auto; }
        .admin-container { flex-direction: column; }
        .admin-sidebar { width: 100%; border-right: none; border-bottom: 1px solid var(--border); flex-direction: row; overflow-x: auto; padding: 0; }
        .admin-tab-btn { border-left: none; border-bottom: 4px solid transparent; white-space: nowrap; }
        .admin-tab-btn.active { border-left-color: transparent; border-bottom-color: var(--navy); }
        .task-col { flex: 0 0 260px; min-width: 260px; }
        .sr-header { flex-direction: column; align-items: flex-start; }
        .sr-profile { width: auto; }
    }
</style>
</head>
<body>

<div id="app">
    <header>
        <div class="brand">
            <div class="brand-icon">🎯</div>
            <div class="brand-text">
                <h1>다했어요! 보드</h1>
                <p>스스로 체크하는 우리 반 과제 관리</p>
            </div>
        </div>
        <div class="mode-toggle">
            <button class="mode-btn active" onclick="switchMode('user')" id="btn-user">🎓 학생 보드</button>
            <button class="mode-btn" onclick="switchMode('admin')" id="btn-admin">🔒 교사 관리자</button>
        </div>
    </header>

    <div id="floating-timer" style="top: 10px; left: 50%; transform: translateX(-50%);">
        <div class="drag-handle" id="timer-drag-handle" title="드래그하여 이동">⋮⋮</div>
        <div class="time-display" id="timeDisplay" onclick="setTimeManually()" title="클릭하여 시간 설정">20:00</div>
        <div class="timer-controls">
            <button class="timer-btn" onclick="adjustTime(-1)">-1</button>
            <button class="timer-btn play-pause-btn" id="playBtn" onclick="toggleTimer()">
                <svg id="icon-play" viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
                <svg id="icon-pause" viewBox="0 0 24 24" style="display:none;"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg>
            </button>
            <button class="timer-btn" onclick="resetTimer()" title="초기화">↺</button>
            <button class="timer-btn" onclick="adjustTime(1)">+1</button>
        </div>
    </div>

    <div id="floating-roster" data-layout="horizontal" style="left: 50%; bottom: 20px; top: auto; right: auto; transform: translateX(-50%);">
        <div class="roster-header" id="roster-drag-handle">
            <div class="roster-title-area">
                <span class="drag-handle" style="padding:0;">⋮⋮</span>
                <span class="roster-title">명단</span>
                <span class="roster-count" id="totalStudentsCount">0명</span>
            </div>
            <div class="roster-controls">
                <button class="roster-btn" onclick="toggleRoster()" id="toggleRosterBtn" title="최소화/최대화">−</button>
            </div>
        </div>
        <div class="dock-container" id="studentDock"></div>
    </div>

    <div id="user-view">
        <div class="board-main">
            <div class="task-container" id="taskGrid"></div>
        </div>
    </div>

    <div id="admin-view">
        <div class="admin-container">
            <aside class="admin-sidebar">
                <button class="admin-tab-btn active" onclick="switchAdminTab('tab-settings', this)">📝 설정 및 관리</button>
                <button class="admin-tab-btn" onclick="switchAdminTab('tab-overview', this)">👀 제출 한눈에 보기</button>
                <button class="admin-tab-btn" onclick="switchAdminTab('tab-bystudent', this)">🏆 학생별 포인트 현황</button>
            </aside>
            <main class="admin-content">
                <div id="tab-settings" class="tab-pane active">
                    <h2 class="panel-title">과제 및 명단 설정 <button class="btn-primary" onclick="resetAllData()" style="background:var(--accent); font-size:0.9rem;">전체 기록 및 포인트 초기화</button></h2>
                    
                    <div class="admin-card" style="display:flex; justify-content:space-between; align-items:center;">
                        <div>
                            <h3 style="margin:0 0 5px 0; color:var(--navy);">👀 학생 보드에 포인트 표시하기</h3>
                            <p style="margin:0; font-size:0.85rem; color:var(--ink-light);">학생 독바와 과제 칩에 현재 획득한 포인트를 보여줍니다. (경쟁 방지를 위해 기본 숨김)</p>
                        </div>
                        <label class="toggle-switch">
                            <input type="checkbox" id="showPointsToggle" onchange="togglePointsVisibility()">
                            <span class="slider"></span>
                        </label>
                    </div>

                    <div class="admin-card">
                        <h3 style="margin-top:0; color:var(--ink-light);">1. 과제 목록 관리 (최대 6개)</h3>
                        <div id="adminTaskList" style="margin-bottom: 15px;"></div>
                        <div style="display:flex; gap:10px; align-items: stretch; position: relative;">
                            <div class="emoji-picker-container">
                                <button class="emoji-selector-btn" id="emojiSelectorBtn" onclick="toggleEmojiPicker()">📝</button>
                                <div class="emoji-picker" id="emojiPicker"></div>
                            </div>
                            <input type="text" id="newTaskTitle" class="text-input" placeholder="새로운 과제 이름 입력" onkeypress="if(event.key==='Enter') addTask()">
                            <select id="newTaskPoints" class="point-select" title="과제 완수 시 획득 포인트">
                                <option value="1">1점</option>
                                <option value="2">2점</option>
                                <option value="3">3점</option>
                            </select>
                            <button class="btn-primary" onclick="addTask()">과제 추가</button>
                        </div>
                    </div>
                    <div class="admin-card">
                        <h3 style="margin-top:0; color:var(--ink-light);">2. 학생 명단 관리</h3>
                        <div style="display:flex; gap:10px; margin-bottom: 15px;">
                            <input type="text" id="newStudentName" class="text-input" placeholder="학생 이름 입력" onkeypress="if(event.key==='Enter') addStudent()">
                            <button class="btn-primary" onclick="addStudent()">학생 추가</button>
                        </div>
                        <div style="display:flex; flex-wrap:wrap; gap:8px;" id="adminStudentList"></div>
                    </div>
                </div>
                <div id="tab-overview" class="tab-pane">
                    <h2 class="panel-title">제출 한눈에 보기 <button class="btn-primary" onclick="renderAdminOverview()" style="background:var(--paper); color:var(--ink);">🔄 새로고침</button></h2>
                    <div class="insight-grid" id="adminOverviewContent"></div>
                </div>
                <div id="tab-bystudent" class="tab-pane">
                    <h2 class="panel-title">🏆 학생별 과제 및 포인트 현황 <button class="btn-primary" onclick="renderAdminByStudent()" style="background:var(--paper); color:var(--ink);">🔄 새로고침</button></h2>
                    <div id="adminByStudentContent" class="student-record-list"></div>
                </div>
            </main>
        </div>
    </div>
</div>

<script>
    /* ── Audio ── */
    let audioCtx;
    function playSound(type) {
        try {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            const now = audioCtx.currentTime;
            if (type === 'drop') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(800, now); osc.frequency.exponentialRampToValueAtTime(1500, now + 0.1);
                gain.gain.setValueAtTime(0.3, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                osc.start(now); osc.stop(now + 0.1);
            } else if (type === 'delete') {
                osc.type = 'triangle'; osc.frequency.setValueAtTime(400, now); osc.frequency.exponentialRampToValueAtTime(200, now + 0.1);
                gain.gain.setValueAtTime(0.2, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                osc.start(now); osc.stop(now + 0.1);
            } else if (type === 'error') {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(200, now); osc.frequency.setValueAtTime(150, now+0.1);
                gain.gain.setValueAtTime(0.2, now); gain.gain.linearRampToValueAtTime(0, now+0.2);
                osc.start(now); osc.stop(now+0.2);
            }
        } catch(e) {}
    }

    /* ── Constants ── */
    const EMOJIS  = ["🐶","🐱","🐭","🐹","🐰","🦊","🐻","🐼","🐨","🐯","🦁","🐮","🐢","🐸","🐵","🐧","🐥","🐬","🦔","🦉"];
    const PASTELS = ["#fef08a","#fbcfe8","#bfdbfe","#a7f3d0","#e9d5ff","#fef9c3","#fecaca","#bbf7d0","#bfdbfe","#e9d5ff","#fbcfe8","#fde047","#fef08a","#fbcfe8","#bfdbfe","#a7f3d0","#e9d5ff","#fef9c3","#fecaca","#bbf7d0"];
    const TASK_COLORS = ["#3b82f6","#10b981","#f59e0b","#8b5cf6","#ec4899","#06b6d4"];
    const TASK_EMOJIS = ["📝","📖","🥛","🧹","🎨","🏃‍♂️","🎵","🗣️","💡","💯","🍎","⏰","🗑️","🧽","🪴","🧩","⚽","🍽️","💻","🔬","🖍️","🎒","🚌","🪥","🦷"];
    const sampleStudents = ["김민준","이서연","박지우","최예준","정윤아","강도윤","임하은","한주원","송지현","오민수","유진아","전진우","윤지호","박수아","이도현","김태희","정우진","최다은","강민지","조윤호"];

    /* ── State ── */
    let students    = JSON.parse(localStorage.getItem('db_students_vf_hagg_fix'))    || sampleStudents;
    let tasks       = JSON.parse(localStorage.getItem('db_tasks_vf_hagg_fix'))       || [
        { id: 't1', title: '아침 독서 기록장', icon: '📖', color: TASK_COLORS[0], points: 1 },
        { id: 't2', title: '우유 다 마시기',   icon: '🥛', color: TASK_COLORS[1], points: 1 },
        { id: 't3', title: '식물의 물 주기',   icon: '🪴', color: TASK_COLORS[2], points: 2 }
    ];
    let completions = JSON.parse(localStorage.getItem('db_completions_vf_hagg_fix')) || {};
    let studentPoints = JSON.parse(localStorage.getItem('db_student_points_vf_hagg_fix')) || {};
    let isPointsVisible = JSON.parse(localStorage.getItem('db_points_visible_vf_hagg_fix')) || false;
    let studentHistory = JSON.parse(localStorage.getItem('db_student_history_vf_hagg_fix')) || {};

    function saveData() {
        localStorage.setItem('db_students_vf_hagg_fix',    JSON.stringify(students));
        localStorage.setItem('db_tasks_vf_hagg_fix',       JSON.stringify(tasks));
        localStorage.setItem('db_completions_vf_hagg_fix', JSON.stringify(completions));
        localStorage.setItem('db_student_points_vf_hagg_fix',    JSON.stringify(studentPoints));
        localStorage.setItem('db_points_visible_vf_hagg_fix',    JSON.stringify(isPointsVisible));
        localStorage.setItem('db_student_history_vf_hagg_fix', JSON.stringify(studentHistory)); 
    }
    
    function getEmoji(idx) { return EMOJIS[idx % EMOJIS.length]; }
    
    function togglePointsVisibility() {
        isPointsVisible = document.getElementById('showPointsToggle').checked;
        if(isPointsVisible) {
            document.body.classList.add('show-points');
        } else {
            document.body.classList.remove('show-points');
        }
        saveData();
    }

    /* ── Layout Adjuster ── */
    function adjustLayout() {
        const roster   = document.getElementById('floating-roster');
        const taskGrid = document.getElementById('taskGrid');
        const header   = document.querySelector('header');
        if (!roster || !taskGrid || !header) return;

        const layout    = roster.getAttribute('data-layout');
        const headerH   = header.getBoundingClientRect().height;

        if (layout === 'horizontal') {
            const rosterRect = roster.getBoundingClientRect();
            const rosterTop  = rosterRect.top;
            const pb = Math.max(window.innerHeight - rosterTop + 10, 20);
            taskGrid.style.paddingBottom = pb + 'px';

            const availH = rosterTop - headerH - 50; 
            document.querySelectorAll('.task-col').forEach(col => { col.style.maxHeight = Math.max(availH, 200) + 'px'; });
            document.querySelectorAll('.task-body').forEach(tb => {
                const headerEl = tb.previousElementSibling; 
                const taskHeaderH = headerEl ? headerEl.getBoundingClientRect().height : 90;
                tb.style.maxHeight = Math.max(availH - taskHeaderH - 30, 100) + 'px';
            });
        } else {
            taskGrid.style.paddingBottom = '30px';
            document.querySelectorAll('.task-col').forEach(col => col.style.maxHeight = '');
            document.querySelectorAll('.task-body').forEach(tb => tb.style.maxHeight = '');
        }
    }

    /* ── Incremental Updates ── */
    function updateProgress(taskId) {
        const task = tasks.find(t => t.id === taskId);
        if (!task) return;
        const col = document.getElementById(`task-col-${taskId}`);
        if (!col) return;
        const cnt    = completions[taskId].length;
        const total  = students.length;
        const pct    = total ? cnt / total : 0;
        const da     = 2 * Math.PI * 18;
        col.querySelector('.progress-fill').style.strokeDashoffset = da * (1 - pct);
        col.querySelector('.progress-text').textContent = cnt;
    }

    function updateAllPointBadges() {
        document.querySelectorAll('.student-point-badge').forEach(badge => {
            const name = badge.dataset.badgeStudent;
            if(name) {
                badge.textContent = studentPoints[name] || 0;
            }
        });
    }

    function createChipEl(taskId, name, sIdx) {
        const chip = document.createElement('div');
        chip.className = 'done-chip chip-enter'; 
        chip.dataset.student = name;
        const pts = studentPoints[name] || 0;
        chip.innerHTML = `
            <div class="student-point-badge" data-badge-student="${name}">${pts}</div>
            <span class="done-emoji">${getEmoji(sIdx)}</span>
            <span class="done-name">${name}</span>
        `;
        chip.addEventListener('click', () => removeCompletion(taskId, name));
        chip.addEventListener('animationend', () => chip.classList.remove('chip-enter'), { once: true });
        return chip;
    }

    function addChipToBoard(taskId, name) {
        const body = document.getElementById(`task-body-${taskId}`);
        if (!body) return;
        const sIdx = students.indexOf(name);
        body.appendChild(createChipEl(taskId, name, sIdx));
        updateProgress(taskId);
    }

    function removeChipFromBoard(taskId, name) {
        const body = document.getElementById(`task-body-${taskId}`);
        if (!body) return;
        const chip = body.querySelector(`[data-student="${CSS.escape(name)}"]`);
        if (chip) chip.remove();
        updateProgress(taskId);
    }

    /* ── Init ── */
    function init() {
        tasks.forEach(t => { 
            if (!completions[t.id]) completions[t.id] = []; 
            if (!t.points) t.points = 1; 
        });
        for (let tid in completions) { completions[tid] = completions[tid].filter(s => students.includes(s)); }
        
        students.forEach(s => { 
            if(studentPoints[s] === undefined) studentPoints[s] = 0; 
            if(studentHistory[s] === undefined) studentHistory[s] = [];
        });
        
        document.getElementById('showPointsToggle').checked = isPointsVisible;
        togglePointsVisibility();

        renderUserView();
        initFloatingTimer();
        initFloatingRoster();
        initEmojiPicker();

        const board = document.getElementById('taskGrid');
        board.addEventListener('wheel', (e) => {
            if (e.deltaY !== 0) { e.preventDefault(); board.scrollLeft += e.deltaY; }
        });

        window.addEventListener('resize', adjustLayout);
        document.body.addEventListener('click', () => { try { if (audioCtx) audioCtx.resume(); } catch(e){} }, { once: true });
    }

    /* ── Mode Switch ── */
    function switchMode(mode) {
        const floatingRoster = document.getElementById('floating-roster');
        if (mode === 'admin') {
            const pwd = prompt("관리자 암호를 입력하세요 (기본: 0000)");
            if (pwd !== '0000') { alert("암호가 틀렸습니다."); return; }
            document.getElementById('user-view').style.display  = 'none';
            document.getElementById('admin-view').style.display = 'flex';
            document.getElementById('btn-user').classList.remove('active');
            document.getElementById('btn-admin').classList.add('active');
            floatingRoster.style.display = 'none';
            renderAdminTasks(); renderAdminStudents(); renderAdminOverview(); renderAdminByStudent();
        } else {
            document.getElementById('user-view').style.display  = 'flex';
            document.getElementById('admin-view').style.display = 'none';
            document.getElementById('btn-user').classList.add('active');
            document.getElementById('btn-admin').classList.remove('active');
            floatingRoster.style.display = 'flex';
            renderUserView();
        }
    }

    function switchAdminTab(tabId, btnEl) {
        document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.admin-tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        btnEl.classList.add('active');
        if (tabId === 'tab-overview')   renderAdminOverview();
        if (tabId === 'tab-bystudent')  renderAdminByStudent();
    }

    /* ── Emoji Picker ── */
    function initEmojiPicker() {
        const picker = document.getElementById('emojiPicker');
        picker.innerHTML = TASK_EMOJIS.map(e => `<div class="emoji-option" onclick="selectEmoji('${e}')">${e}</div>`).join('');
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.emoji-picker-container')) {
                document.getElementById('emojiPicker').classList.remove('show');
            }
        });
    }
    function toggleEmojiPicker() { document.getElementById('emojiPicker').classList.toggle('show'); }
    function selectEmoji(emoji) { document.getElementById('emojiSelectorBtn').textContent = emoji; document.getElementById('emojiPicker').classList.remove('show'); }

    /* ── Render User View ── */
    function renderUserView() {
        const grid = document.getElementById('taskGrid');
        grid.setAttribute('data-count', tasks.length);
        grid.innerHTML = '';

        tasks.forEach(task => {
            const cnt    = completions[task.id].length;
            const total  = students.length;
            const pct    = total ? cnt / total : 0;
            const da     = 2 * Math.PI * 18;

            const col = document.createElement('div');
            col.className = 'task-col';
            col.id = `task-col-${task.id}`;
            col.setAttribute('data-task-id', task.id);
            col.innerHTML = `
                <div class="task-header">
                    <div class="task-icon" style="background:${task.color}15; color:${task.color}">${task.icon}</div>
                    <div class="task-info">
                        <h3 class="task-title">${task.title} <span style="font-size:0.8rem; color:var(--ink-light); font-weight:normal; background:var(--paper); padding:2px 6px; border-radius:10px;">${task.points}점</span></h3>
                    </div>
                    <div class="progress-wrap">
                        <svg class="progress-svg" viewBox="0 0 44 44">
                            <circle class="progress-bg" cx="22" cy="22" r="18"></circle>
                            <circle class="progress-fill" cx="22" cy="22" r="18" stroke="${task.color}" stroke-dasharray="${da}" stroke-dashoffset="${da * (1 - pct)}"></circle>
                        </svg>
                        <div class="progress-text">${cnt}</div>
                    </div>
                </div>
                <div class="task-body" id="task-body-${task.id}"></div>
                <canvas class="confetti-canvas" id="canvas-${task.id}"></canvas>
            `;
            grid.appendChild(col);

            const body = col.querySelector(`#task-body-${task.id}`);
            completions[task.id].forEach(name => {
                const sIdx = students.indexOf(name);
                const chip = document.createElement('div');
                chip.className = 'done-chip'; 
                chip.dataset.student = name;
                const pts = studentPoints[name] || 0;
                chip.innerHTML = `
                    <div class="student-point-badge" data-badge-student="${name}">${pts}</div>
                    <span class="done-emoji">${getEmoji(sIdx)}</span>
                    <span class="done-name">${name}</span>
                `;
                chip.addEventListener('click', () => removeCompletion(task.id, name));
                body.appendChild(chip);
            });
        });

        renderDock();
        requestAnimationFrame(adjustLayout);
    }

    /* ── Render Dock ── */
    function renderDock() {
        const dock = document.getElementById('studentDock');
        dock.innerHTML = '';
        document.getElementById('totalStudentsCount').textContent = `${students.length}명`;

        students.forEach((name, idx) => {
            const chip   = document.createElement('div');
            chip.className = 'draggable-chip';
            const pastel = PASTELS[idx % PASTELS.length];
            const pts = studentPoints[name] || 0;
            chip.innerHTML = `
                <div class="student-point-badge" data-badge-student="${name}">${pts}</div>
                <div class="dock-emoji-wrap" style="background-color:${pastel};">
                    <span class="dock-emoji">${getEmoji(idx)}</span>
                </div>
                <span class="dock-name">${name}</span>
            `;
            chip.addEventListener('pointerdown', (e) => startDrag(e, name, idx, chip, pastel));
            dock.appendChild(chip);
        });
    }

    /* ── Floating Roster ── */
    function initFloatingRoster() {
        const rosterEl = document.getElementById('floating-roster');
        const handle   = document.getElementById('roster-drag-handle');
        let isDragging = false, offsetX, offsetY;
        let animationFrameId;

        handle.addEventListener('pointerdown', (e) => {
            if (e.target.tagName.toLowerCase() === 'button') return;
            isDragging = true;
            document.body.classList.add('is-dragging');
            const rect = rosterEl.getBoundingClientRect();
            rosterEl.style.transition = 'none';
            rosterEl.style.left   = rect.left + 'px';
            rosterEl.style.top    = rect.top  + 'px';
            rosterEl.style.right  = 'auto';
            rosterEl.style.bottom = 'auto';
            rosterEl.style.transform = 'none';
            offsetX = e.clientX - rect.left;
            offsetY = e.clientY - rect.top;
            document.addEventListener('pointermove', onMove, { passive: false });
            document.addEventListener('pointerup',   onUp);
        });

        function onMove(e) {
            if (!isDragging) return;
            e.preventDefault();
            if (animationFrameId) cancelAnimationFrame(animationFrameId);
            
            animationFrameId = requestAnimationFrame(() => {
                const ww = window.innerWidth, wh = window.innerHeight;
                const rect = rosterEl.getBoundingClientRect();
                
                let newLeft = e.clientX - offsetX;
                let newTop  = e.clientY - offsetY;
                
                newLeft = Math.max(0, Math.min(newLeft, ww - rect.width));
                newTop  = Math.max(0, Math.min(newTop,  wh - rect.height));

                rosterEl.style.left = newLeft + 'px';
                rosterEl.style.top  = newTop  + 'px';
            });
        }

        function onUp(e) {
            isDragging = false;
            if (animationFrameId) cancelAnimationFrame(animationFrameId);
            document.body.classList.remove('is-dragging');
            document.removeEventListener('pointermove', onMove);
            document.removeEventListener('pointerup',   onUp);

            rosterEl.style.transition = 'left 0.4s cubic-bezier(0.16,1,0.3,1), top 0.4s cubic-bezier(0.16,1,0.3,1), right 0.4s, bottom 0.4s, transform 0.4s';
            const ww = window.innerWidth, wh = window.innerHeight;
            const cx = e.clientX, cy = e.clientY;

            if (cy > wh * 0.7) {
                rosterEl.setAttribute('data-layout', 'horizontal');
                rosterEl.style.left   = '50%'; rosterEl.style.top = 'auto';
                rosterEl.style.bottom = '20px'; rosterEl.style.right = 'auto';
                rosterEl.style.transform = 'translateX(-50%)';
            } else if (cx < ww * 0.35) {
                rosterEl.setAttribute('data-layout', 'vertical');
                rosterEl.style.left   = '20px'; rosterEl.style.top = '50%';
                rosterEl.style.bottom = 'auto'; rosterEl.style.right = 'auto';
                rosterEl.style.transform = 'translateY(-50%)';
            } else if (cx > ww * 0.65) {
                rosterEl.setAttribute('data-layout', 'vertical');
                rosterEl.style.left   = 'auto'; rosterEl.style.right = '20px';
                rosterEl.style.top    = '50%';  rosterEl.style.bottom = 'auto';
                rosterEl.style.transform = 'translateY(-50%)';
            } else {
                rosterEl.setAttribute('data-layout', 'horizontal');
                rosterEl.style.left   = '50%'; rosterEl.style.top = 'auto';
                rosterEl.style.bottom = '20px'; rosterEl.style.transform = 'translateX(-50%)';
            }

            setTimeout(() => { rosterEl.style.transition = 'none'; adjustLayout(); }, 420);
        }
    }

    function toggleRoster() {
        const dock = document.getElementById('studentDock');
        const btn  = document.getElementById('toggleRosterBtn');
        if (dock.style.display === 'none') {
            dock.style.display = ''; btn.textContent = '−';
        } else {
            dock.style.display = 'none'; btn.textContent = '＋';
        }
        requestAnimationFrame(adjustLayout);
    }

    /* ── Drag & Drop ── */
    let ghost = null, dragStudentName = null, currentHoverCol = null;

    function startDrag(e, name, idx, sourceEl, pastelColor) {
        e.preventDefault();
        dragStudentName = name;
        document.body.classList.add('is-dragging');

        ghost = document.createElement('div');
        ghost.className = 'ghost-chip';
        ghost.innerHTML = `
            <div class="dock-emoji-wrap" style="background-color:${pastelColor}; width:44px; height:44px; border-radius:50%; display:flex; align-items:center; justify-content:center;">
                <span class="dock-emoji" style="font-size:2rem; line-height:1;">${getEmoji(idx)}</span>
            </div>
            <span style="font-weight:700; font-size:0.9rem;">${name}</span>
        `;
        document.body.appendChild(ghost);
        moveGhost(e);

        document.addEventListener('pointermove', onDragMove, { passive: false });
        document.addEventListener('pointerup',   onDragEnd);
    }

    function moveGhost(e) {
        if (!ghost) return;
        ghost.style.left = (e.clientX || (e.touches && e.touches[0].clientX)) + 'px';
        ghost.style.top  = (e.clientY || (e.touches && e.touches[0].clientY)) + 'px';
    }

    function onDragMove(e) {
        e.preventDefault();
        moveGhost(e);
        const x = e.clientX || (e.touches && e.touches[0].clientX);
        const y = e.clientY || (e.touches && e.touches[0].clientY);
        const colBelow = document.elementFromPoint(x, y)?.closest('.task-col') || null;
        if (currentHoverCol !== colBelow) {
            if (currentHoverCol) currentHoverCol.classList.remove('drag-over');
            if (colBelow)        colBelow.classList.add('drag-over');
            currentHoverCol = colBelow;
        }
    }

    function onDragEnd(e) {
        document.body.classList.remove('is-dragging');
        document.removeEventListener('pointermove', onDragMove);
        document.removeEventListener('pointerup',   onDragEnd);
        if (ghost) { ghost.remove(); ghost = null; }
        if (currentHoverCol) {
            currentHoverCol.classList.remove('drag-over');
            handleDrop(currentHoverCol.getAttribute('data-task-id'), dragStudentName);
            currentHoverCol = null;
        }
        dragStudentName = null;
    }

    function handleDrop(taskId, studentName) {
        if (!completions[taskId]) completions[taskId] = [];
        if (completions[taskId].includes(studentName)) { playSound('error'); return; }
        
        const task = tasks.find(t => t.id === taskId);
        const earnedPoints = task.points ? parseInt(task.points) : 1;

        completions[taskId].push(studentName);
        studentPoints[studentName] = (studentPoints[studentName] || 0) + earnedPoints; 

        if (!studentHistory[studentName].find(h => h.id === taskId)) {
            studentHistory[studentName].push({
                id: taskId,
                title: task.title,
                icon: task.icon,
                points: earnedPoints
            });
        }

        saveData();
        playSound('drop');
        addChipToBoard(taskId, studentName); 
        updateAllPointBadges(); 
        updateAdminStudentRow(studentName); 
        fireConfetti(taskId);
    }

    function removeCompletion(taskId, studentName) {
        if (!confirm(`${studentName} 학생의 기록을 취소할까요?`)) return;
        
        const task = tasks.find(t => t.id === taskId);
        const lostPoints = task.points ? parseInt(task.points) : 1;

        completions[taskId] = completions[taskId].filter(n => n !== studentName);
        studentPoints[studentName] = Math.max(0, (studentPoints[studentName] || 0) - lostPoints); 
        
        studentHistory[studentName] = studentHistory[studentName].filter(h => h.id !== taskId);

        saveData();
        playSound('delete');
        removeChipFromBoard(taskId, studentName);
        updateAllPointBadges(); 
        updateAdminStudentRow(studentName);
    }

    /* ── Confetti ── */
    function fireConfetti(taskId) {
        const canvas = document.getElementById(`canvas-${taskId}`);
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        canvas.width  = canvas.offsetWidth;
        canvas.height = canvas.offsetHeight;
        const particles = [];
        const colors = ['#f59e0b','#10b981','#3b82f6','#ec4899','#8b5cf6'];
        for (let i = 0; i < 30; i++) {
            particles.push({
                x: canvas.width / 2, y: canvas.height - 20,
                r: Math.random() * 5 + 3,
                dx: Math.random() * 10 - 5, dy: Math.random() * -12 - 5,
                color: colors[Math.floor(Math.random() * colors.length)]
            });
        }
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            let active = false;
            particles.forEach(p => {
                p.x += p.dx; p.y += p.dy; p.dy += 0.5;
                if (p.y < canvas.height) active = true;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                ctx.fillStyle = p.color; ctx.fill();
            });
            if (active) requestAnimationFrame(animate);
            else ctx.clearRect(0, 0, canvas.width, canvas.height);
        }
        animate();
    }

    /* ── Timer ── */
    let totalSeconds = 20 * 60, timeRemaining = totalSeconds, timerInterval = null, isPlaying = false;

    function initFloatingTimer() {
        const timerEl = document.getElementById('floating-timer');
        const handle  = document.getElementById('timer-drag-handle');
        let isDragging = false, offsetX, offsetY;

        handle.addEventListener('pointerdown', (e) => {
            isDragging = true;
            const rect = timerEl.getBoundingClientRect();
            timerEl.style.transform = 'none';
            timerEl.style.left = rect.left + 'px';
            timerEl.style.top  = rect.top  + 'px';
            offsetX = e.clientX - rect.left;
            offsetY = e.clientY - rect.top;
            document.addEventListener('pointermove', onMove, { passive: false });
            document.addEventListener('pointerup',   onUp);
        });
        function onMove(e) { if (!isDragging) return; e.preventDefault(); timerEl.style.left = (e.clientX - offsetX) + 'px'; timerEl.style.top = (e.clientY - offsetY) + 'px'; }
        function onUp()    { isDragging = false; document.removeEventListener('pointermove', onMove); document.removeEventListener('pointerup', onUp); }
        updateTimerDisplay();
    }

    function updateTimerDisplay() {
        const m = String(Math.floor(timeRemaining / 60)).padStart(2, '0');
        const s = String(timeRemaining % 60).padStart(2, '0');
        const display = document.getElementById('timeDisplay');
        display.textContent = `${m}:${s}`;
        display.classList.toggle('warning', timeRemaining <= 60 && timeRemaining > 0);
    }
    function setTimeManually() {
        if (isPlaying) toggleTimer();
        const input = prompt("설정할 시간을 분 단위로 입력하세요 (예: 15)", Math.floor(timeRemaining / 60));
        if (input && !isNaN(input) && parseInt(input) > 0) { timeRemaining = parseInt(input) * 60; updateTimerDisplay(); }
    }
    function adjustTime(min) { timeRemaining = Math.max(0, timeRemaining + min * 60); updateTimerDisplay(); }
    function toggleTimer() {
        const ip = document.getElementById('icon-play'), ipa = document.getElementById('icon-pause');
        if (isPlaying) {
            clearInterval(timerInterval); ip.style.display = 'block'; ipa.style.display = 'none';
        } else {
            if (timeRemaining <= 0) return;
            timerInterval = setInterval(() => {
                timeRemaining--; updateTimerDisplay();
                if (timeRemaining <= 0) {
                    clearInterval(timerInterval); isPlaying = false;
                    ip.style.display = 'block'; ipa.style.display = 'none';
                    playSound('alert'); setTimeout(() => alert("⏰ 시간이 종료되었습니다!"), 100);
                }
            }, 1000);
            ip.style.display = 'none'; ipa.style.display = 'block';
        }
        isPlaying = !isPlaying;
    }
    function resetTimer() {
        clearInterval(timerInterval); isPlaying = false;
        document.getElementById('icon-play').style.display  = 'block';
        document.getElementById('icon-pause').style.display = 'none';
        timeRemaining = 20 * 60; updateTimerDisplay();
    }

    /* ── Admin: Tasks ── */
    function renderAdminTasks() {
        document.getElementById('adminTaskList').innerHTML = tasks.map(t => `
            <div class="task-edit-item">
                <span class="icon-input">${t.icon}</span>
                <span style="flex-grow:1; font-weight:700; font-size:1.05rem;">${t.title} <span style="font-size:0.8rem; color:var(--ink-light); margin-left:8px;">(${t.points}점)</span></span>
                <button class="btn-danger-sm" onclick="removeTask('${t.id}')" title="삭제">✕</button>
            </div>
        `).join('');
    }
    function addTask() {
        if (tasks.length >= 6) { alert("과제는 최대 6개까지 추가할 수 있습니다."); return; }
        const title = document.getElementById('newTaskTitle').value.trim();
        const icon  = document.getElementById('emojiSelectorBtn').textContent.trim() || '📝';
        const points = parseInt(document.getElementById('newTaskPoints').value) || 1; 

        if (title) {
            const newId = 't' + Date.now();
            tasks.push({ id: newId, title, icon, color: TASK_COLORS[tasks.length % TASK_COLORS.length], points: points });
            completions[newId] = [];
            document.getElementById('newTaskTitle').value = '';
            saveData(); renderAdminTasks();
            if (document.getElementById('user-view').style.display !== 'none') renderUserView();
        }
    }
    function removeTask(id) {
        if (!confirm("정말 이 과제를 삭제하시겠습니까?\n(삭제해도 학생들이 획득한 포인트 내역은 영구 보존됩니다)")) return;
        tasks = tasks.filter(t => t.id !== id);
        delete completions[id]; 
        saveData(); renderAdminTasks();
        if (document.getElementById('user-view').style.display !== 'none') renderUserView();
    }
    
    function resetAllData() {
        if (!confirm("모든 학생의 제출 기록과 누적 포인트를 0으로 초기화하시겠습니까? (과제와 명단은 유지됩니다)")) return;
        tasks.forEach(t => completions[t.id] = []);
        students.forEach(s => {
            studentPoints[s] = 0; 
            studentHistory[s] = []; 
        });
        saveData(); alert("모든 기록과 포인트가 초기화되었습니다!");
        renderAdminOverview(); renderAdminByStudent();
        if (document.getElementById('user-view').style.display !== 'none') {
            renderUserView();
        }
    }

    /* ── Admin: Students ── */
    function renderAdminStudents() {
        document.getElementById('adminStudentList').innerHTML = students.map((name, idx) => `
            <div style="background:var(--paper); border:1px solid var(--border); padding:8px 14px; border-radius:100px; font-weight:700; font-size:0.95rem; display:flex; align-items:center; gap:8px;">
                ${getEmoji(idx)} ${name}
                <span style="color:var(--accent); cursor:pointer; margin-left:4px;" onclick="removeStudent(${idx})">✕</span>
            </div>
        `).join('');
    }
    function addStudent() {
        const input = document.getElementById('newStudentName'), name = input.value.trim();
        if (name) {
            students.push(name); 
            studentPoints[name] = 0; 
            studentHistory[name] = [];
            input.value = '';
            saveData(); renderAdminStudents();
            if (document.getElementById('user-view').style.display !== 'none') renderDock();
        }
    }
    function removeStudent(idx) {
        if (!confirm("이 학생을 명단에서 삭제할까요?")) return;
        const name = students[idx];
        students.splice(idx, 1);
        delete studentPoints[name]; 
        delete studentHistory[name];
        for (let tid in completions) completions[tid] = completions[tid].filter(s => s !== name);
        saveData(); renderAdminStudents();
        if (document.getElementById('user-view').style.display !== 'none') renderUserView();
    }

    /* ── Admin: Overview & ByStudent ── */
    function renderAdminOverview() {
        document.getElementById('adminOverviewContent').innerHTML = tasks.map(task => {
            const done    = completions[task.id];
            const missing = students.filter(s => !done.includes(s));
            return `
                <div class="insight-box">
                    <div class="insight-header">${task.icon} ${task.title}</div>
                    <div class="status-section">
                        <div class="status-title" style="color:var(--success)">✅ 제출완료 (${done.length}명)</div>
                        <div class="chip-wrap">${done.length ? done.map(s => `<span class="chip done">${s}</span>`).join('') : '<span style="color:var(--ink-light)">아직 제출자가 없습니다.</span>'}</div>
                    </div>
                    <div class="status-section">
                        <div class="status-title" style="color:var(--accent)">🚨 미제출 (${missing.length}명)</div>
                        <div class="chip-wrap">${missing.length ? missing.map(s => `<span class="chip missing">${s}</span>`).join('') : '<span style="color:var(--success); font-weight:bold;">🎉 전원 제출 완료!</span>'}</div>
                    </div>
                </div>
            `;
        }).join('');
    }

    function toggleStudentDetails(idx) {
        const header = document.getElementById(`sr-header-${idx}`);
        const body = document.getElementById(`sr-body-${idx}`);
        header.classList.toggle('open');
        body.classList.toggle('open');
    }

    /* 🌟 190일 대비 누적 합산 로직 (정규화된 키로 스마트 그룹핑) */
    function generateStudentCardHTML(student, idx) {
        const badges = tasks.map(task => {
            const isDone = completions[task.id].includes(student);
            return `<span class="badge ${isDone ? 'done' : 'missing'}">${task.icon} <span>${task.title}</span> <strong style="margin-left:4px;">${isDone ? 'O' : 'X'}</strong></span>`;
        }).join('');
        
        const currentPoints = studentPoints[student] || 0;
        const historyLogs = studentHistory[student] || []; 
        const safeName = student.replace(/\s/g, '');

        // 🌟 정규화 그룹핑 로직 (공백 및 구두점 무시)
        const aggregated = {};
        historyLogs.forEach(log => {
            const normalizedKey = log.title.replace(/[\s.,!?~()]+/g, '').toLowerCase();
            
            if(!aggregated[normalizedKey]) {
                aggregated[normalizedKey] = {
                    displayTitle: log.title, 
                    icon: log.icon,
                    count: 0,
                    points: 0
                };
            }
            aggregated[normalizedKey].count += 1;
            aggregated[normalizedKey].points += (log.points || 1);
        });

        // 🌟 많이 한 순서대로 정렬
        const aggregatedArray = Object.keys(aggregated).map(key => ({
            title: aggregated[key].displayTitle,
            icon: aggregated[key].icon,
            count: aggregated[key].count,
            points: aggregated[key].points
        })).sort((a, b) => b.count - a.count);

        let historyItemsHTML = `<div style="font-size:0.9rem; color:var(--ink-light); padding: 10px 0;">아직 완료한 과제가 없습니다.</div>`;
        
        if (aggregatedArray.length > 0) {
            historyItemsHTML = `<div class="task-history-list">` + aggregatedArray.map(item => `
                <div class="task-history-item">
                    <span style="font-size:1.1rem;">${item.icon}</span>
                    <span>${item.title}</span>
                    <span style="color:var(--navy); font-weight:800; margin-left:4px;">${item.count}회</span>
                    <span style="color:var(--accent); font-size:0.8rem; margin-left:2px;">(${item.points}P)</span>
                </div>
            `).join('') + `</div>`;
        }

        return `
            <div class="sr-header" id="sr-header-${idx}" onclick="toggleStudentDetails(${idx})">
                <div class="sr-profile">${getEmoji(idx)} ${student}</div>
                <div class="sr-points-ctrl" onclick="event.stopPropagation()">
                    <button onclick="manualAdjustPoint(event, '${student}', -1)">-</button>
                    <span class="pt-display-${safeName}">${currentPoints}</span>
                    <button onclick="manualAdjustPoint(event, '${student}', 1)">+</button>
                </div>
                <div class="sr-badges">${badges}</div>
                <div class="sr-chevron">▼</div>
            </div>
            <div class="sr-body" id="sr-body-${idx}">
                <h4 style="margin: 0 0 12px 0; color: var(--navy); font-size: 0.95rem; border-bottom: 2px dashed var(--border); padding-bottom: 8px;">
                    🎁 누적 과제 수행 통계 <span style="font-weight:normal; font-size:0.8rem; color:var(--ink-light);">(과제를 삭제해도 영구 보존 / 횟수 자동 합산)</span>
                </h4>
                ${historyItemsHTML}
                <div style="height: 15px;"></div>
            </div>
        `;
    }

    function renderAdminByStudent() {
        const container = document.getElementById('adminByStudentContent');
        container.innerHTML = students.map((student, idx) => {
            return `<div class="student-record-card" id="student-card-${idx}">
                        ${generateStudentCardHTML(student, idx)}
                    </div>`;
        }).join('');
    }

    function updateAdminStudentRow(studentName) {
        const idx = students.indexOf(studentName);
        if (idx === -1) return;
        const card = document.getElementById(`student-card-${idx}`);
        if (!card) return;
        
        const header = document.getElementById(`sr-header-${idx}`);
        const isOpen = header && header.classList.contains('open');

        card.innerHTML = generateStudentCardHTML(studentName, idx);

        if (isOpen) {
            document.getElementById(`sr-header-${idx}`).classList.add('open');
            document.getElementById(`sr-body-${idx}`).classList.add('open');
        }
    }

    function manualAdjustPoint(e, studentName, amount) {
        if(e) e.stopPropagation();
        studentPoints[studentName] = Math.max(0, (studentPoints[studentName] || 0) + amount);
        saveData();
        
        updateAdminStudentRow(studentName);
        updateAllPointBadges();
    }

    window.onload = init;
</script>
</body>
</html>
