<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>다했어요! 보드 (Task Manager)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" />

<style>
    :root {
        --ink: #0f172a;
        --ink-light: #475569;
        --paper: #f8fafc;
        --surface: #ffffff;
        --navy: #1e3a8a;
        --navy-light: #eff6ff;
        --accent: #e11d48;
        --success: #10b981;
        --border: #e2e8f0;
        
        --shadow-sm: 0 2px 4px rgba(0,0,0,0.02);
        --shadow-md: 0 4px 12px rgba(0,0,0,0.05);
        --shadow-lg: 0 15px 35px rgba(15, 23, 42, 0.08);
        
        --radius-sm: 8px;
        --radius-md: 16px;
        --radius-lg: 24px;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body, html {
        margin: 0; padding: 0; height: 100%; overflow: hidden;
        font-family: 'Pretendard', 'DM Sans', sans-serif;
        background: var(--paper); color: var(--ink);
        background-image: radial-gradient(#cbd5e1 1px, transparent 1px); background-size: 20px 20px;
    }

    #app { display: flex; flex-direction: column; height: 100vh; position: relative; }

    /* ─────────────────────────────────────────
       TOP HEADER
    ───────────────────────────────────────── */
    header {
        display: flex; justify-content: space-between; align-items: center;
        padding: 20px 30px; background: rgba(255, 255, 255, 0.8);
        backdrop-filter: blur(12px); border-bottom: 1px solid var(--border);
        z-index: 50; flex-shrink: 0;
    }
    .brand { display: flex; align-items: center; gap: 12px; }
    .brand-icon { font-size: 2rem; }
    .brand-text h1 { margin: 0; font-size: 1.5rem; font-weight: 800; color: var(--navy); letter-spacing: -0.5px; }
    .brand-text p { margin: 0; font-size: 0.85rem; color: var(--ink-light); font-weight: 600; }
    
    .mode-toggle {
        display: flex; background: var(--paper); border-radius: 100px; padding: 4px; border: 1px solid var(--border);
    }
    .mode-btn {
        padding: 8px 20px; border: none; background: transparent; border-radius: 100px;
        font-weight: 700; color: var(--ink-light); cursor: pointer; transition: 0.2s; font-size: 0.95rem;
    }
    .mode-btn.active { background: var(--surface); color: var(--navy); box-shadow: var(--shadow-sm); }

    /* ─────────────────────────────────────────
       USER VIEW (STUDENT BOARD)
    ───────────────────────────────────────── */
    #user-view { flex-grow: 1; display: flex; flex-direction: column; overflow: hidden; }

    /* Task Grid Layout (1~6 Columns) */
    .task-container {
        flex-grow: 1; padding: 20px 30px; overflow-y: auto;
        display: grid; gap: 20px; align-content: start;
    }
    .task-container[data-count="1"] { grid-template-columns: max-content; justify-content: center; }
    .task-container[data-count="1"] .task-col { width: 400px; }
    .task-container[data-count="2"] { grid-template-columns: repeat(2, 1fr); max-width: 1000px; margin: 0 auto; }
    .task-container[data-count="3"] { grid-template-columns: repeat(3, 1fr); max-width: 1200px; margin: 0 auto; }
    .task-container[data-count="4"] { grid-template-columns: repeat(4, 1fr); }
    .task-container[data-count="5"] { grid-template-columns: repeat(5, 1fr); }
    .task-container[data-count="6"] { grid-template-columns: repeat(3, 1fr); } /* 2 rows of 3 */

    /* Task Column */
    .task-col {
        background: rgba(255, 255, 255, 0.75); border: 2px solid var(--surface);
        border-radius: var(--radius-lg); box-shadow: var(--shadow-md);
        display: flex; flex-direction: column; height: 100%; min-height: 400px;
        position: relative; transition: transform 0.2s, box-shadow 0.2s;
    }
    .task-col.drag-over {
        transform: scale(1.02); border-color: var(--navy); box-shadow: 0 0 0 4px rgba(30, 58, 138, 0.1);
        background: rgba(255, 255, 255, 0.95);
    }
    
    .task-header {
        padding: 20px; border-bottom: 2px dashed var(--border); display: flex; align-items: center; gap: 15px;
    }
    .task-icon {
        width: 50px; height: 50px; border-radius: 16px; display: flex; align-items: center; justify-content: center;
        font-size: 1.8rem; flex-shrink: 0; box-shadow: inset 0 0 0 1px rgba(0,0,0,0.05);
    }
    .task-info { flex-grow: 1; }
    .task-title { font-size: 1.1rem; font-weight: 800; margin: 0; color: var(--ink); line-height: 1.3; }
    
    /* Progress Ring */
    .progress-wrap { position: relative; width: 46px; height: 46px; flex-shrink: 0; }
    .progress-svg { transform: rotate(-90deg); width: 100%; height: 100%; }
    .progress-bg { fill: none; stroke: var(--paper); stroke-width: 4; }
    .progress-fill { fill: none; stroke: var(--success); stroke-width: 4; stroke-linecap: round; transition: stroke-dashoffset 0.5s ease; }
    .progress-text { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: 800; color: var(--ink); }

    /* Drop Zone (Completed Students) */
    .task-body {
        padding: 16px; flex-grow: 1; overflow-y: auto;
        display: grid; grid-template-columns: repeat(auto-fill, minmax(70px, 1fr)); gap: 10px; align-content: start;
    }
    
    .done-chip {
        background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-md);
        padding: 8px 4px; display: flex; flex-direction: column; align-items: center; gap: 4px;
        box-shadow: var(--shadow-sm); animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        cursor: pointer; position: relative;
    }
    .done-chip:hover::after {
        content: '✕ 삭제'; position: absolute; inset: 0; background: rgba(225, 29, 72, 0.9); color: white;
        border-radius: var(--radius-md); display: flex; align-items: center; justify-content: center;
        font-size: 0.8rem; font-weight: bold; animation: fadeIn 0.2s;
    }
    .done-emoji { font-size: 1.5rem; }
    .done-name { font-size: 0.8rem; font-weight: 700; color: var(--ink); }

    /* Bottom Dock (Student Roster) */
    .dock-wrapper {
        background: var(--surface); border-top: 1px solid var(--border);
        padding: 20px; z-index: 100; box-shadow: 0 -4px 20px rgba(0,0,0,0.03);
    }
    .dock-title { font-size: 0.9rem; font-weight: 700; color: var(--ink-light); margin-bottom: 12px; display: flex; justify-content: space-between; }
    
    .dock-container {
        display: flex; gap: 12px; overflow-x: auto; padding-bottom: 10px; scrollbar-width: none;
    }
    .dock-container::-webkit-scrollbar { display: none; }
    
    .draggable-chip {
        min-width: 100px; background: var(--paper); border: 1px solid var(--border);
        border-radius: 100px; padding: 10px 16px; display: flex; align-items: center; gap: 8px;
        font-weight: 700; font-size: 1rem; cursor: grab; user-select: none; touch-action: none;
        transition: transform 0.2s, box-shadow 0.2s; flex-shrink: 0;
    }
    .draggable-chip:active { cursor: grabbing; transform: scale(0.95); }
    
    /* Dragging Ghost Clone */
    .ghost-chip {
        position: fixed; pointer-events: none; z-index: 9999;
        background: var(--surface); border: 2px solid var(--navy); border-radius: 100px;
        padding: 10px 16px; display: flex; align-items: center; gap: 8px; font-weight: 700; font-size: 1rem;
        box-shadow: var(--shadow-lg); opacity: 0.9; transform: translate(-50%, -50%) scale(1.1);
    }

    /* ─────────────────────────────────────────
       ADMIN VIEW (TEACHER DASHBOARD)
    ───────────────────────────────────────── */
    #admin-view {
        flex-grow: 1; padding: 30px; overflow-y: auto; display: none; background: #f1f5f9;
    }
    .admin-grid {
        display: grid; grid-template-columns: 1fr 1fr; gap: 30px; max-width: 1400px; margin: 0 auto;
    }
    .admin-panel {
        background: var(--surface); border-radius: var(--radius-lg); padding: 24px; box-shadow: var(--shadow-md);
    }
    .panel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .panel-title { font-size: 1.2rem; font-weight: 800; color: var(--navy); margin: 0; }
    
    /* 1. Task Settings */
    .task-edit-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px; }
    .task-edit-item {
        display: flex; gap: 10px; align-items: center; background: var(--paper); padding: 12px; border-radius: var(--radius-md);
    }
    .icon-input { width: 50px; text-align: center; font-size: 1.5rem; }
    .text-input { flex-grow: 1; }
    .btn-icon { width: 36px; height: 36px; border-radius: var(--radius-sm); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: bold; }
    .btn-danger { background: #ffe4e6; color: var(--accent); }
    .btn-danger:hover { background: var(--accent); color: white; }

    /* 2. Insight Panel (Missing Students) */
    .insight-list { display: flex; flex-direction: column; gap: 16px; }
    .insight-item { border: 1px solid var(--border); border-radius: var(--radius-md); overflow: hidden; }
    .insight-header { background: var(--paper); padding: 12px 16px; font-weight: 800; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
    .insight-body { padding: 16px; display: flex; flex-wrap: wrap; gap: 8px; }
    .missing-chip {
        background: #fff1f2; color: var(--accent); border: 1px solid #fecdd3;
        padding: 6px 12px; border-radius: 100px; font-size: 0.85rem; font-weight: 700;
        display: flex; align-items: center; gap: 4px;
    }
    .all-done-msg { color: var(--success); font-weight: 700; font-size: 0.95rem; display: flex; align-items: center; gap: 6px; }

    /* Inputs & Buttons */
    .input-box { border: 1px solid var(--border); padding: 12px; border-radius: var(--radius-sm); outline: none; font-size: 0.95rem; font-family: inherit; }
    .input-box:focus { border-color: var(--navy); }
    .btn-primary { background: var(--navy); color: white; border: none; padding: 12px 20px; border-radius: var(--radius-sm); font-weight: 700; cursor: pointer; }
    .btn-primary:hover { background: #172554; }

    /* ─────────────────────────────────────────
       ANIMATIONS & MEDIA QUERIES
    ───────────────────────────────────────── */
    @keyframes popIn { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    @keyframes fadeIn { 0% { opacity: 0; } 100% { opacity: 1; } }
    
    /* Confetti Canvas */
    .confetti-canvas { position: absolute; inset: 0; pointer-events: none; z-index: 10; border-radius: var(--radius-lg); }

    @media (max-width: 1024px) {
        .task-container[data-count="4"], .task-container[data-count="5"], .task-container[data-count="6"] { grid-template-columns: repeat(2, 1fr); }
        .admin-grid { grid-template-columns: 1fr; }
    }
    @media (max-width: 600px) {
        .task-container[data-count] { grid-template-columns: 1fr; }
        header { padding: 15px; flex-direction: column; gap: 15px; }
    }
</style>
</head>
<body>

<div id="app">
    <header>
        <div class="brand">
            <div class="brand-icon">🎯</div>
            <div class="brand-text">
                <h1>다했어요! 보드</h1>
                <p>스스로 체크하는 우리 반 과제 관리</p>
            </div>
        </div>
        <div class="mode-toggle">
            <button class="mode-btn active" onclick="switchMode('user')" id="btn-user">🎓 학생 제출 보드</button>
            <button class="mode-btn" onclick="switchMode('admin')" id="btn-admin">🔒 교사 관리자</button>
        </div>
    </header>

    <div id="user-view">
        <div class="task-container" id="taskGrid" data-count="3">
            </div>

        <div class="dock-wrapper">
            <div class="dock-title">
                <span>👇 내 이름표를 꾹 눌러서 완료한 과제 위로 던져주세요!</span>
                <span id="totalStudentsCount">총 0명</span>
            </div>
            <div class="dock-container" id="studentDock">
                </div>
        </div>
    </div>

    <div id="admin-view">
        <div class="admin-grid">
            <div class="admin-panel">
                <div class="panel-header">
                    <h2 class="panel-title">📝 과제 설정 (최대 6개)</h2>
                    <button class="btn-primary" onclick="resetAllCompletions()" style="background:var(--accent)">전체 제출 기록 초기화</button>
                </div>
                <div class="task-edit-list" id="adminTaskList"></div>
                <div style="display:flex; gap:10px; margin-top: 15px;">
                    <input type="text" id="newTaskIcon" class="input-box icon-input" placeholder="이모지" value="📝">
                    <input type="text" id="newTaskTitle" class="input-box text-input" placeholder="새로운 과제 이름 입력" onkeypress="if(event.key==='Enter') addTask()">
                    <button class="btn-primary" onclick="addTask()">추가</button>
                </div>
            </div>

            <div class="admin-panel">
                <div class="panel-header">
                    <h2 class="panel-title">👀 미제출자 한눈에 보기</h2>
                    <button class="btn-icon" style="background:var(--paper)" onclick="renderAdminInsights()" title="새로고침">🔄</button>
                </div>
                <div class="insight-list" id="adminInsights"></div>
            </div>

            <div class="admin-panel">
                <div class="panel-header">
                    <h2 class="panel-title">🧑‍🏫 학생 명단 관리</h2>
                </div>
                <div style="display:flex; gap:10px; margin-bottom: 15px;">
                    <input type="text" id="newStudentName" class="input-box text-input" placeholder="학생 이름 입력" onkeypress="if(event.key==='Enter') addStudent()">
                    <button class="btn-primary" onclick="addStudent()">추가</button>
                </div>
                <div style="display:flex; flex-wrap:wrap; gap:8px;" id="adminStudentList"></div>
            </div>
        </div>
    </div>
</div>

<script>
    /* ==========================================
       사운드 엔진 (팝 소리 & 환호성)
    ========================================== */
    let audioCtx;
    function playSound(type) {
        try {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            const now = audioCtx.currentTime;

            if (type === 'drop') {
                // 경쾌하게 쏙 들어가는 소리
                osc.type = 'sine'; osc.frequency.setValueAtTime(800, now); osc.frequency.exponentialRampToValueAtTime(1500, now + 0.1);
                gain.gain.setValueAtTime(0.3, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                osc.start(now); osc.stop(now + 0.1);
            } else if (type === 'delete') {
                // 뽁! 빠지는 소리
                osc.type = 'triangle'; osc.frequency.setValueAtTime(400, now); osc.frequency.exponentialRampToValueAtTime(200, now + 0.1);
                gain.gain.setValueAtTime(0.2, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                osc.start(now); osc.stop(now + 0.1);
            } else if (type === 'error') {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(200, now); osc.frequency.setValueAtTime(150, now+0.1);
                gain.gain.setValueAtTime(0.2, now); gain.gain.linearRampToValueAtTime(0, now+0.2);
                osc.start(now); osc.stop(now+0.2);
            }
        } catch(e) {}
    }

    /* ==========================================
       데이터 상태 (State)
    ========================================== */
    const EMOJIS = ["🐶","🐱","🐭","🐹","🐰","🦊","🐻","🐼","🐨","🐯","🦁","🐮","🐢","🐸","🐵","🐧","🐥","🐬","🦔","🦉"];
    const TASK_COLORS = ["#3b82f6", "#10b981", "#f59e0b", "#8b5cf6", "#ec4899", "#06b6d4"];

    let students = JSON.parse(localStorage.getItem('db_students')) || ["김민준","이서연","박지우","최예준","정윤아","강도윤","임하은","한주원","송지현","오민수","유진아","전진우"];
    
    // 기본 과제 세팅
    let tasks = JSON.parse(localStorage.getItem('db_tasks')) || [
        { id: 't1', title: '아침 독서 기록장', icon: '📖', color: TASK_COLORS[0] },
        { id: 't2', title: '우유 다 마시기', icon: '🥛', color: TASK_COLORS[1] },
        { id: 't3', title: '수학 익힘책 12쪽', icon: '✏️', color: TASK_COLORS[2] }
    ];

    // 완료 기록: { taskId: [studentName1, studentName2] }
    let completions = JSON.parse(localStorage.getItem('db_completions')) || {};

    /* ==========================================
       유틸리티 함수
    ========================================== */
    function saveData() {
        localStorage.setItem('db_students', JSON.stringify(students));
        localStorage.setItem('db_tasks', JSON.stringify(tasks));
        localStorage.setItem('db_completions', JSON.stringify(completions));
    }

    function getEmoji(idx) { return EMOJIS[idx % EMOJIS.length]; }

    /* ==========================================
       초기화 및 렌더링
    ========================================== */
    function init() {
        // 기존 완료 데이터 중 삭제된 과제나 학생 정리
        tasks.forEach(t => { if (!completions[t.id]) completions[t.id] = []; });
        for (let tid in completions) {
            completions[tid] = completions[tid].filter(s => students.includes(s));
        }
        
        renderUserView();
        
        // 휠 가로스크롤 지원 (대기소)
        const dock = document.getElementById('studentDock');
        dock.addEventListener('wheel', (e) => { if (e.deltaY !== 0) { e.preventDefault(); dock.scrollLeft += e.deltaY; } });
        
        // 오디오 초기화
        document.body.addEventListener('click', () => { try{ if(audioCtx) audioCtx.resume(); }catch(e){} }, {once: true});
    }

    function switchMode(mode) {
        if(mode === 'admin') {
            const pwd = prompt("관리자 암호를 입력하세요 (기본: 0000)");
            if (pwd !== '0000') { alert("암호가 틀렸습니다."); return; }
            document.getElementById('user-view').style.display = 'none';
            document.getElementById('admin-view').style.display = 'block';
            document.getElementById('btn-user').classList.remove('active');
            document.getElementById('btn-admin').classList.add('active');
            renderAdminView();
        } else {
            document.getElementById('user-view').style.display = 'flex';
            document.getElementById('admin-view').style.display = 'none';
            document.getElementById('btn-user').classList.add('active');
            document.getElementById('btn-admin').classList.remove('active');
            renderUserView();
        }
    }

    /* ==========================================
       USER VIEW 렌더링 (학생 화면)
    ========================================== */
    function renderUserView() {
        const grid = document.getElementById('taskGrid');
        grid.setAttribute('data-count', tasks.length);
        grid.innerHTML = '';

        tasks.forEach(task => {
            const completedCount = completions[task.id].length;
            const totalCount = students.length;
            const pct = totalCount ? (completedCount / totalCount) : 0;
            const dashArray = 2 * Math.PI * 18; // 113.1

            const col = document.createElement('div');
            col.className = 'task-col';
            col.id = `task-col-${task.id}`;
            col.setAttribute('data-task-id', task.id);
            col.style.setProperty('--task-color', task.color);

            // 렌더링: 헤더 + 드롭존 바디
            col.innerHTML = `
                <div class="task-header">
                    <div class="task-icon" style="background:${task.color}15; color:${task.color}">${task.icon}</div>
                    <div class="task-info">
                        <h3 class="task-title">${task.title}</h3>
                    </div>
                    <div class="progress-wrap">
                        <svg class="progress-svg" viewBox="0 0 44 44">
                            <circle class="progress-bg" cx="22" cy="22" r="18"></circle>
                            <circle class="progress-fill" cx="22" cy="22" r="18" stroke="${task.color}" stroke-dasharray="${dashArray}" stroke-dashoffset="${dashArray * (1 - pct)}"></circle>
                        </svg>
                        <div class="progress-text">${completedCount}</div>
                    </div>
                </div>
                <div class="task-body" id="task-body-${task.id}">
                    ${completions[task.id].map(name => {
                        const sIdx = students.indexOf(name);
                        return `<div class="done-chip" onclick="removeCompletion('${task.id}', '${name}')">
                            <span class="done-emoji">${getEmoji(sIdx)}</span>
                            <span class="done-name">${name}</span>
                        </div>`;
                    }).join('')}
                </div>
                <canvas class="confetti-canvas" id="canvas-${task.id}"></canvas>
            `;
            grid.appendChild(col);
        });

        renderDock();
    }

    function renderDock() {
        const dock = document.getElementById('studentDock');
        dock.innerHTML = '';
        document.getElementById('totalStudentsCount').textContent = `총 ${students.length}명`;

        students.forEach((name, idx) => {
            const chip = document.createElement('div');
            chip.className = 'draggable-chip';
            chip.innerHTML = `<span style="font-size:1.3rem">${getEmoji(idx)}</span> <span>${name}</span>`;
            
            // 드래그 이벤트 부착 (커스텀 구현)
            chip.addEventListener('pointerdown', (e) => startDrag(e, name, idx, chip));
            dock.appendChild(chip);
        });
    }

    /* ==========================================
       드래그 앤 드롭 구현 (커스텀 Pointer Events)
    ========================================== */
    let ghost = null;
    let dragStudentName = null;
    let currentHoverCol = null;

    function startDrag(e, name, idx, sourceEl) {
        e.preventDefault();
        dragStudentName = name;
        
        // 고스트 엘리먼트 생성
        ghost = document.createElement('div');
        ghost.className = 'ghost-chip';
        ghost.innerHTML = `<span style="font-size:1.3rem">${getEmoji(idx)}</span> <span>${name}</span>`;
        document.body.appendChild(ghost);
        
        moveGhost(e);
        
        document.addEventListener('pointermove', onDragMove, {passive: false});
        document.addEventListener('pointerup', onDragEnd);
    }

    function moveGhost(e) {
        if(!ghost) return;
        const x = e.clientX || (e.touches && e.touches[0].clientX);
        const y = e.clientY || (e.touches && e.touches[0].clientY);
        ghost.style.left = x + 'px';
        ghost.style.top = y + 'px';
    }

    function onDragMove(e) {
        e.preventDefault();
        moveGhost(e);
        
        const x = e.clientX || (e.touches && e.touches[0].clientX);
        const y = e.clientY || (e.touches && e.touches[0].clientY);
        
        // 고스트를 잠시 숨기고 아래에 있는 엘리먼트 파악
        ghost.style.display = 'none';
        const elemBelow = document.elementFromPoint(x, y);
        ghost.style.display = 'flex';
        
        const colBelow = elemBelow ? elemBelow.closest('.task-col') : null;
        
        if (currentHoverCol !== colBelow) {
            if (currentHoverCol) currentHoverCol.classList.remove('drag-over');
            if (colBelow) colBelow.classList.add('drag-over');
            currentHoverCol = colBelow;
        }
    }

    function onDragEnd(e) {
        document.removeEventListener('pointermove', onDragMove);
        document.removeEventListener('pointerup', onDragEnd);
        
        if (ghost) { ghost.remove(); ghost = null; }
        if (currentHoverCol) {
            currentHoverCol.classList.remove('drag-over');
            const taskId = currentHoverCol.getAttribute('data-task-id');
            handleDrop(taskId, dragStudentName);
            currentHoverCol = null;
        }
        dragStudentName = null;
    }

    /* ==========================================
       제출 및 삭제 처리 로직
    ========================================== */
    function handleDrop(taskId, studentName) {
        if (!completions[taskId]) completions[taskId] = [];
        
        if (completions[taskId].includes(studentName)) {
            playSound('error');
            return; // 이미 제출함
        }
        
        // 제출 성공
        completions[taskId].push(studentName);
        saveData();
        playSound('drop');
        fireConfetti(taskId);
        renderUserView();
    }

    function removeCompletion(taskId, studentName) {
        if(confirm(`${studentName} 학생의 제출 기록을 취소할까요?`)) {
            completions[taskId] = completions[taskId].filter(n => n !== studentName);
            saveData();
            playSound('delete');
            renderUserView();
        }
    }

    /* ==========================================
       폭죽 파티클 효과 (Confetti)
    ========================================== */
    function fireConfetti(taskId) {
        const canvas = document.getElementById(`canvas-${taskId}`);
        if(!canvas) return;
        const ctx = canvas.getContext('2d');
        canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight;
        
        const particles = [];
        const colors = ['#f59e0b', '#10b981', '#3b82f6', '#ec4899', '#8b5cf6'];
        
        for(let i=0; i<30; i++) {
            particles.push({
                x: canvas.width / 2, y: canvas.height - 20,
                r: Math.random() * 5 + 3,
                dx: Math.random() * 10 - 5,
                dy: Math.random() * -10 - 5,
                color: colors[Math.floor(Math.random() * colors.length)]
            });
        }
        
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            let active = false;
            particles.forEach(p => {
                p.x += p.dx; p.y += p.dy; p.dy += 0.5; // 중력
                if(p.y < canvas.height) { active = true; }
                ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
                ctx.fillStyle = p.color; ctx.fill();
            });
            if(active) requestAnimationFrame(animate);
            else ctx.clearRect(0,0,canvas.width,canvas.height);
        }
        animate();
    }

    /* ==========================================
       ADMIN VIEW 렌더링 (교사 화면)
    ========================================== */
    function renderAdminView() {
        renderAdminTasks();
        renderAdminInsights();
        renderAdminStudents();
    }

    // 1. 과제 설정
    function renderAdminTasks() {
        const list = document.getElementById('adminTaskList');
        list.innerHTML = tasks.map((t, idx) => `
            <div class="task-edit-item">
                <span class="icon-input">${t.icon}</span>
                <span class="text-input" style="font-weight:700">${t.title}</span>
                <button class="btn-icon" style="background:#f1f5f9" onclick="resetSingleTask('${t.id}')" title="이 과제만 초기화">🔄</button>
                <button class="btn-icon btn-danger" onclick="removeTask('${t.id}')" title="삭제">✕</button>
            </div>
        `).join('');
    }

    function addTask() {
        if(tasks.length >= 6) { alert("과제는 최대 6개까지만 만들 수 있습니다."); return; }
        const title = document.getElementById('newTaskTitle').value.trim();
        const icon = document.getElementById('newTaskIcon').value.trim() || '📝';
        if(title) {
            const newId = 't' + Date.now();
            const newColor = TASK_COLORS[tasks.length % TASK_COLORS.length];
            tasks.push({ id: newId, title, icon, color: newColor });
            completions[newId] = [];
            document.getElementById('newTaskTitle').value = '';
            saveData(); renderAdminTasks(); renderAdminInsights();
        }
    }

    function removeTask(id) {
        if(confirm("정말 이 과제를 삭제하시겠습니까?")) {
            tasks = tasks.filter(t => t.id !== id);
            delete completions[id];
            saveData(); renderAdminTasks(); renderAdminInsights();
        }
    }

    function resetSingleTask(id) {
        if(confirm("이 과제의 제출 기록을 모두 지우시겠습니까?")) {
            completions[id] = [];
            saveData(); renderAdminInsights();
        }
    }

    function resetAllCompletions() {
        if(confirm("모든 과제의 제출 기록을 완전히 초기화하시겠습니까? (과제 목록은 유지됩니다)")) {
            tasks.forEach(t => completions[t.id] = []);
            saveData(); renderAdminInsights();
        }
    }

    // 2. 미제출자 인사이트 (선생님 최애 기능)
    function renderAdminInsights() {
        const panel = document.getElementById('adminInsights');
        panel.innerHTML = tasks.map(task => {
            const missing = students.filter(s => !completions[task.id].includes(s));
            const isAllDone = missing.length === 0;
            
            let bodyHtml = isAllDone 
                ? `<div class="all-done-msg">🎉 전원 제출 완료! 최고예요!</div>`
                : missing.map(name => `<div class="missing-chip"><span>🚨</span> ${name}</div>`).join('');
                
            return `
                <div class="insight-item">
                    <div class="insight-header">
                        <span>${task.icon} ${task.title}</span>
                        <span style="color:var(--accent)">미제출 ${missing.length}명</span>
                    </div>
                    <div class="insight-body">${bodyHtml}</div>
                </div>
            `;
        }).join('');
    }

    // 3. 학생 명단 관리
    function renderAdminStudents() {
        const list = document.getElementById('adminStudentList');
        list.innerHTML = students.map((name, idx) => `
            <div style="background:var(--paper); border:1px solid var(--border); padding:6px 12px; border-radius:100px; font-weight:600; font-size:0.9rem; display:flex; align-items:center; gap:6px;">
                ${getEmoji(idx)} ${name}
                <span style="color:var(--accent); cursor:pointer; font-weight:800;" onclick="removeStudent(${idx})">✕</span>
            </div>
        `).join('');
    }

    function addStudent() {
        const input = document.getElementById('newStudentName');
        const name = input.value.trim();
        if(name) {
            students.push(name);
            input.value = '';
            saveData(); renderAdminStudents(); renderAdminInsights();
        }
    }

    function removeStudent(idx) {
        if(confirm("이 학생을 명단에서 삭제할까요?")) {
            const name = students[idx];
            students.splice(idx, 1);
            // 완료 기록에서도 삭제
            for(let tid in completions) {
                completions[tid] = completions[tid].filter(s => s !== name);
            }
            saveData(); renderAdminStudents(); renderAdminInsights();
        }
    }

    // 실행
    window.onload = init;
</script>
</body>
</html>
