<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>다했어요! 보드 (Ultimate Mac OS Edition)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" />

<style>
    /* ==========================================
       CSS Variables & Reset
    ========================================== */
    :root {
        --ink: #0f172a;
        --ink-light: #475569;
        --paper: #f8fafc;
        --surface: #ffffff;
        --navy: #1e3a8a;
        --navy-light: #eff6ff;
        --accent: #e11d48;
        --success: #10b981;
        --border: #e2e8f0;
        
        --shadow-sm: 0 2px 4px rgba(0,0,0,0.02);
        --shadow-md: 0 4px 12px rgba(0,0,0,0.05);
        --shadow-lg: 0 15px 35px rgba(15, 23, 42, 0.08);
        --shadow-dock: 0 20px 50px rgba(0, 0, 0, 0.15);
        
        --radius-sm: 8px;
        --radius-md: 16px;
        --radius-lg: 24px;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body, html {
        margin: 0; padding: 0; height: 100%; overflow: hidden;
        font-family: 'Pretendard', 'DM Sans', sans-serif;
        background: var(--paper); color: var(--ink);
        background-image: radial-gradient(#cbd5e1 1px, transparent 1px); background-size: 20px 20px;
    }

    #app { display: flex; flex-direction: column; height: 100vh; position: relative; }

    /* ==========================================
       Header
    ========================================== */
    header {
        display: flex; justify-content: space-between; align-items: center;
        padding: 16px 30px; background: rgba(255, 255, 255, 0.85);
        backdrop-filter: blur(12px); border-bottom: 1px solid var(--border);
        z-index: 50; flex-shrink: 0; height: 80px; position: relative;
    }
    .brand { display: flex; align-items: center; gap: 12px; width: 300px; }
    .brand-icon { font-size: 2rem; }
    .brand-text h1 { margin: 0; font-size: 1.4rem; font-weight: 800; color: var(--navy); letter-spacing: -0.5px; }
    .brand-text p { margin: 0; font-size: 0.85rem; color: var(--ink-light); font-weight: 600; }
    
    .header-right { width: 300px; display: flex; justify-content: flex-end; }
    .mode-toggle { display: flex; background: var(--paper); border-radius: 100px; padding: 4px; border: 1px solid var(--border); }
    .mode-btn {
        padding: 8px 20px; border: none; background: transparent; border-radius: 100px;
        font-weight: 700; color: var(--ink-light); cursor: pointer; transition: 0.2s; font-size: 0.95rem;
    }
    .mode-btn.active { background: var(--surface); color: var(--navy); box-shadow: var(--shadow-sm); }

    /* ==========================================
       Floating Timer (첫 화면: 상단 중앙 배치)
    ========================================== */
    #floating-timer {
        position: absolute; z-index: 1000;
        top: 16px; left: 50%; transform: translateX(-50%);
        background: var(--surface); border: 1px solid var(--border); border-radius: 100px;
        box-shadow: var(--shadow-md); padding: 6px 16px 6px 10px;
        display: flex; align-items: center; gap: 16px;
        transition: box-shadow 0.2s;
    }
    #floating-timer.dragging { box-shadow: var(--shadow-lg); opacity: 0.95; transition: none !important; }
    
    .drag-handle { cursor: grab; padding: 10px; color: var(--ink-light); font-size: 1.2rem; line-height: 0.5; user-select: none; touch-action: none;}
    .drag-handle:active { cursor: grabbing; color: var(--navy); }
    
    .time-display { font-family: 'DM Sans', sans-serif; font-size: 2rem; font-weight: 800; color: var(--ink); letter-spacing: -1px; font-variant-numeric: tabular-nums; cursor: pointer; }
    .time-display.warning { color: var(--accent); animation: pulse 1s infinite; }
    
    .timer-controls { display: flex; gap: 6px; align-items: center; }
    .timer-btn { width: 36px; height: 36px; border: none; border-radius: 50%; background: var(--paper); display: flex; align-items: center; justify-content: center; cursor: pointer; font-weight: bold; color: var(--ink-light); transition: 0.2s; }
    .timer-btn:hover { background: var(--border); color: var(--ink); }
    .play-pause-btn { width: 44px; height: 44px; background: var(--navy); color: white; box-shadow: 0 4px 10px rgba(30, 58, 138, 0.3); }
    .play-pause-btn:hover { background: #172554; }
    .play-pause-btn svg { width: 18px; height: 18px; fill: currentColor; }

    /* ==========================================
       USER VIEW (Main Board)
    ========================================== */
    #user-view { flex-grow: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }

    .task-container {
        display: flex; gap: 24px; width: 100%; height: 100%;
        padding: 40px 60px 260px 60px; /* 독바 공간 넉넉히 확보 및 액자형 가운데 정렬 */
        overflow-x: auto; overflow-y: hidden;
        align-items: stretch; justify-content: center;
    }
    
    .task-container::-webkit-scrollbar { height: 10px; }
    .task-container::-webkit-scrollbar-track { background: transparent; }
    .task-container::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

    .task-col {
        flex: 1 1 300px; min-width: 280px; max-width: 600px; 
        background: rgba(255, 255, 255, 0.9); border: 2px solid var(--surface);
        border-radius: var(--radius-lg); box-shadow: var(--shadow-md);
        display: flex; flex-direction: column; position: relative; 
        transition: box-shadow 0.2s ease, border-color 0.2s ease;
    }
    .task-col.drag-over { border-color: var(--navy); box-shadow: inset 0 0 0 2px var(--navy), var(--shadow-lg); background: var(--surface); }
    
    .task-header { padding: 20px 24px; border-bottom: 2px dashed var(--border); display: flex; align-items: center; gap: 15px; transition: all 0.3s ease; }
    .task-icon { width: 48px; height: 48px; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; flex-shrink: 0; box-shadow: inset 0 0 0 1px rgba(0,0,0,0.05); transition: all 0.3s ease; }
    .task-info { flex-grow: 1; }
    .task-title { font-size: 1.1rem; font-weight: 800; margin: 0; color: var(--ink); line-height: 1.3; transition: all 0.3s ease; }
    
    .progress-wrap { position: relative; width: 42px; height: 42px; flex-shrink: 0; transition: all 0.3s ease; }
    .progress-svg { transform: rotate(-90deg); width: 100%; height: 100%; }
    .progress-bg { fill: none; stroke: var(--paper); stroke-width: 4; }
    .progress-fill { fill: none; stroke: var(--success); stroke-width: 4; stroke-linecap: round; transition: stroke-dashoffset 0.5s ease; }
    .progress-text { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: 800; color: var(--ink); transition: all 0.3s ease; }

    /* 과제 개수에 따른 다이나믹 스케일링 */
    .task-container[data-count="1"] .task-col { max-width: 800px; margin: 0 auto; }
    .task-container[data-count="1"] .task-header { padding: 40px; }
    .task-container[data-count="1"] .task-icon { width: 80px; height: 80px; font-size: 3.5rem; border-radius: 20px; }
    .task-container[data-count="1"] .task-title { font-size: 2rem; }
    .task-container[data-count="1"] .progress-wrap { width: 70px; height: 70px; }
    .task-container[data-count="1"] .progress-text { font-size: 1.2rem; }
    .task-container[data-count="1"] .done-chip { padding: 16px 8px; }
    .task-container[data-count="1"] .done-emoji { font-size: 2rem; }
    .task-container[data-count="1"] .done-name { font-size: 1rem; }

    .task-container[data-count="2"] .task-col { max-width: 550px; margin: 0 auto; }
    .task-container[data-count="2"] .task-header { padding: 30px; }
    .task-container[data-count="2"] .task-icon { width: 64px; height: 64px; font-size: 2.5rem; border-radius: 16px; }
    .task-container[data-count="2"] .task-title { font-size: 1.5rem; }
    .task-container[data-count="2"] .progress-wrap { width: 56px; height: 56px; }
    .task-container[data-count="2"] .progress-text { font-size: 1rem; }

    .task-body {
        padding: 24px; flex-grow: 1; overflow-y: auto;
        display: grid; grid-template-columns: repeat(auto-fill, minmax(85px, 1fr)); gap: 12px; align-content: start;
    }
    
    .done-chip {
        background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-md);
        padding: 12px 6px; display: flex; flex-direction: column; align-items: center; gap: 6px;
        box-shadow: var(--shadow-sm); animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        cursor: pointer; position: relative; overflow: hidden;
    }
    .done-chip:hover::after {
        content: '✕ 취소'; position: absolute; inset: 0; background: rgba(225, 29, 72, 0.9); color: white;
        display: flex; align-items: center; justify-content: center; font-size: 0.85rem; font-weight: bold; animation: fadeIn 0.2s;
    }
    .done-emoji { font-size: 1.6rem; }
    .done-name { font-size: 0.85rem; font-weight: 700; color: var(--ink); white-space: nowrap; }

    /* ==========================================
       Mac OS Dock (Floating Roster)
       핵심: 좌/우 = 2열, 하단 = 2행 자동 정렬
    ========================================== */
    #floating-roster {
        position: fixed; z-index: 900;
        background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(255,255,255,0.6); box-shadow: var(--shadow-dock);
        display: flex; transition: left 0.4s cubic-bezier(0.16, 1, 0.3, 1), top 0.4s cubic-bezier(0.16, 1, 0.3, 1), transform 0.4s, border-radius 0.4s;
    }
    #floating-roster.dragging { transition: none !important; opacity: 0.9; }

    .roster-header {
        background: rgba(240, 244, 248, 0.9); display: flex; justify-content: space-between; align-items: center;
        cursor: grab; padding: 12px 20px; flex-shrink: 0;
    }
    .roster-header:active { cursor: grabbing; }
    .roster-title-area { display: flex; align-items: center; gap: 8px; }
    .roster-title { font-weight: 800; color: var(--navy); margin: 0; font-size: 1rem; }
    .roster-count { font-size: 0.75rem; color: var(--surface); font-weight: 700; background: var(--navy); padding: 4px 10px; border-radius: 100px; }

    /* --- SNAP: BOTTOM (최대 2행 가로 스크롤) --- */
    #floating-roster[data-position="bottom"] {
        flex-direction: column; left: 50%; bottom: 20px; top: auto; transform: translateX(-50%);
        border-radius: 24px; max-width: 95vw; 
    }
    #floating-roster[data-position="bottom"] .roster-header { border-bottom: 1px solid var(--border); border-radius: 24px 24px 0 0; }
    #floating-roster[data-position="bottom"] .dock-container {
        display: grid;
        grid-template-rows: repeat(2, auto); /* 최대 2행 */
        grid-auto-flow: column; /* 오른쪽으로 추가 */
        gap: 12px; padding: 16px 20px;
        overflow-x: auto; overflow-y: hidden;
    }

    /* --- SNAP: LEFT / RIGHT (최대 2열 세로 스크롤) --- */
    #floating-roster[data-position="left"],
    #floating-roster[data-position="right"] {
        flex-direction: column; top: 50%; bottom: auto; transform: translateY(-50%);
        border-radius: 24px; max-height: 85vh; width: auto;
    }
    #floating-roster[data-position="left"] { left: 20px; right: auto; }
    #floating-roster[data-position="right"] { right: 20px; left: auto; }
    
    #floating-roster[data-position="left"] .roster-header,
    #floating-roster[data-position="right"] .roster-header { border-bottom: 1px solid var(--border); border-radius: 24px 24px 0 0; }
    #floating-roster[data-position="left"] .dock-container,
    #floating-roster[data-position="right"] .dock-container {
        display: grid;
        grid-template-columns: repeat(2, 1fr); /* 최대 2열 */
        grid-auto-flow: row; /* 아래로 추가 */
        gap: 12px; padding: 16px 20px;
        overflow-y: auto; overflow-x: hidden;
    }

    /* Mac OS Dock Hover Animation */
    .dock-chip {
        background: var(--surface); border: 1px solid var(--border); border-radius: 16px; 
        padding: 10px 14px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px;
        font-weight: 700; font-size: 0.85rem; color: var(--ink);
        cursor: grab; user-select: none; touch-action: none; 
        box-shadow: var(--shadow-sm); min-width: 80px; flex-shrink: 0;
        transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.2s;
        will-change: transform;
    }
    .dock-chip:hover {
        transform: scale(1.25) translateY(-8px); z-index: 10;
        box-shadow: 0 15px 25px rgba(0,0,0,0.15);
        border-color: var(--navy); color: var(--navy);
    }
    .dock-chip:active { cursor: grabbing; transform: scale(1); opacity: 0.5; }
    .dock-emoji { font-size: 1.8rem; line-height: 1; pointer-events: none; }
    .dock-name { pointer-events: none; white-space: nowrap; }

    /* Custom Scrollbar for Dock */
    .dock-container::-webkit-scrollbar { width: 8px; height: 8px; }
    .dock-container::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

    /* Dragging Ghost Clone */
    .ghost-chip {
        position: fixed; pointer-events: none; z-index: 9999;
        background: var(--surface); border: 2px solid var(--navy); border-radius: 16px;
        padding: 10px 14px; display: flex; flex-direction: column; align-items: center; gap: 4px;
        font-weight: 700; font-size: 0.85rem; color: var(--navy);
        box-shadow: var(--shadow-lg); opacity: 0.95; transform: translate(-50%, -50%) scale(1.1);
    }
    .ghost-chip .dock-emoji { font-size: 1.8rem; }

    /* ==========================================
       ADMIN VIEW (교사 관리자)
    ========================================== */
    #admin-view { flex-grow: 1; display: none; background: var(--paper); overflow: hidden; }
    .admin-container { display: flex; height: 100%; width: 100%; max-width: 1600px; margin: 0 auto; }
    
    .admin-sidebar {
        width: 260px; background: var(--surface); border-right: 1px solid var(--border);
        padding: 20px 0; display: flex; flex-direction: column; gap: 5px; flex-shrink: 0;
    }
    .admin-tab-btn {
        padding: 16px 24px; text-align: left; background: transparent; border: none; font-size: 1.05rem;
        font-weight: 700; color: var(--ink-light); cursor: pointer; transition: 0.2s;
        border-left: 4px solid transparent; display: flex; align-items: center; gap: 10px;
    }
    .admin-tab-btn:hover { background: var(--paper); color: var(--ink); }
    .admin-tab-btn.active { background: var(--navy-light); color: var(--navy); border-left-color: var(--navy); }
    
    .admin-content { flex-grow: 1; padding: 40px; overflow-y: auto; }
    .tab-pane { display: none; animation: fadeIn 0.3s; max-width: 1000px; }
    .tab-pane.active { display: block; }
    
    .panel-title { font-size: 1.4rem; font-weight: 800; color: var(--navy); margin: 0 0 24px 0; display: flex; justify-content: space-between; align-items: center; }

    .admin-card { background: var(--surface); border-radius: var(--radius-lg); padding: 24px; box-shadow: var(--shadow-sm); border: 1px solid var(--border); margin-bottom: 24px; }
    .task-edit-item { display: flex; gap: 10px; align-items: center; background: var(--paper); padding: 12px; border-radius: var(--radius-md); margin-bottom: 8px; }
    .icon-input { width: 50px; text-align: center; font-size: 1.5rem; }
    .text-input { flex-grow: 1; border: 1px solid var(--border); padding: 12px; border-radius: var(--radius-sm); outline: none; font-size: 0.95rem; font-family: inherit; }
    .text-input:focus { border-color: var(--navy); }
    .btn-primary { background: var(--navy); color: white; border: none; padding: 12px 20px; border-radius: var(--radius-sm); font-weight: 700; cursor: pointer; white-space: nowrap; transition: 0.2s;}
    .btn-primary:hover { background: #172554; }
    .btn-danger-sm { background: #ffe4e6; color: var(--accent); border: none; width: 36px; height: 36px; border-radius: var(--radius-sm); cursor: pointer; font-weight: bold; transition: 0.2s;}
    .btn-danger-sm:hover { background: var(--accent); color: white; }

    /* Emoji Picker */
    .emoji-picker-container { position: relative; display: flex; align-items: stretch; }
    .emoji-selector-btn { width: 60px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--surface); font-size: 1.5rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: border-color 0.2s; }
    .emoji-selector-btn:hover { border-color: var(--navy); }
    .emoji-picker { position: absolute; top: calc(100% + 10px); left: 0; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-md); box-shadow: var(--shadow-lg); padding: 12px; display: none; grid-template-columns: repeat(5, 1fr); gap: 6px; z-index: 100; }
    .emoji-picker.show { display: grid; animation: fadeIn 0.2s; }
    .emoji-option { width: 42px; height: 42px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; cursor: pointer; border-radius: 8px; transition: background 0.2s; }
    .emoji-option:hover { background: var(--paper); }

    /* Insights & Tables */
    .insight-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(400px, 1fr)); gap: 24px; }
    .insight-box { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; box-shadow: var(--shadow-sm); }
    .insight-header { background: var(--paper); padding: 16px 20px; font-weight: 800; font-size: 1.1rem; border-bottom: 1px solid var(--border); }
    .status-section { padding: 16px 20px; border-bottom: 1px dashed var(--border); }
    .status-section:last-child { border-bottom: none; }
    .status-title { font-size: 0.9rem; font-weight: 800; color: var(--ink-light); margin-bottom: 10px; }
    .chip-wrap { display: flex; flex-wrap: wrap; gap: 8px; }
    .chip { padding: 6px 12px; border-radius: 100px; font-size: 0.85rem; font-weight: 700; display: flex; align-items: center; gap: 4px; }
    .chip.done { background: #ecfdf5; color: #047857; border: 1px solid #a7f3d0; }
    .chip.missing { background: #fff1f2; color: var(--accent); border: 1px solid #fecdd3; }

    .student-record-table { width: 100%; border-collapse: collapse; background: var(--surface); border-radius: var(--radius-lg); overflow: hidden; box-shadow: var(--shadow-sm); border: 1px solid var(--border); }
    .student-record-table th, .student-record-table td { padding: 16px; text-align: left; border-bottom: 1px solid var(--border); vertical-align: top; }
    .student-record-table th { background: var(--paper); font-weight: 800; color: var(--ink-light); }
    .student-record-table tr:last-child td { border-bottom: none; }
    .badge { display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: 8px; font-size: 0.9rem; margin: 0 6px 6px 0; border: 1px solid transparent; }
    .badge.done { background: #ecfdf5; color: #047857; border-color: #a7f3d0; }
    .badge.missing { background: var(--paper); color: var(--ink-light); border-color: var(--border); opacity: 0.75; }

    @keyframes popIn { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    @keyframes fadeIn { 0% { opacity: 0; } 100% { opacity: 1; } }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    
    .confetti-canvas { position: absolute; inset: 0; pointer-events: none; z-index: 10; border-radius: var(--radius-lg); }
</style>
</head>
<body>

<div id="app">
    <header id="main-header">
        <div class="brand">
            <div class="brand-icon">🎯</div>
            <div class="brand-text">
                <h1>다했어요! 보드</h1>
                <p>스스로 체크하는 우리 반 과제 관리</p>
            </div>
        </div>
        <div class="header-right">
            <div class="mode-toggle">
                <button class="mode-btn active" onclick="switchMode('user')" id="btn-user">🎓 학생 보드</button>
                <button class="mode-btn" onclick="switchMode('admin')" id="btn-admin">🔒 교사 관리자</button>
            </div>
        </div>
    </header>

    <div id="floating-timer">
        <div class="drag-handle" id="timer-drag-handle" title="드래그하여 이동">⋮⋮</div>
        <div class="time-display" id="timeDisplay" onclick="setTimeManually()" title="클릭하여 시간 설정">20:00</div>
        <div class="timer-controls">
            <button class="timer-btn" onclick="adjustTime(-1)">-1</button>
            <button class="timer-btn play-pause-btn" id="playBtn" onclick="toggleTimer()">
                <svg id="icon-play" viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
                <svg id="icon-pause" viewBox="0 0 24 24" style="display:none;"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg>
            </button>
            <button class="timer-btn" onclick="resetTimer()" title="초기화">↺</button>
            <button class="timer-btn" onclick="adjustTime(1)">+1</button>
        </div>
    </div>

    <div id="user-view">
        <div class="board-main">
            <div class="task-container" id="taskGrid"></div>
        </div>
    </div>
    
    <div id="floating-roster" data-position="bottom">
        <div class="roster-header" id="roster-drag-handle">
            <div class="roster-title-area">
                <span class="roster-title">👇 내 이름표 던지기</span>
                <span class="roster-count" id="totalStudentsCount">0명</span>
            </div>
        </div>
        <div class="dock-container" id="studentDock"></div>
    </div>

    <div id="admin-view">
        <div class="admin-container">
            <aside class="admin-sidebar">
                <button class="admin-tab-btn active" onclick="switchAdminTab('tab-settings', this)">📝 과제 및 명단 설정</button>
                <button class="admin-tab-btn" onclick="switchAdminTab('tab-overview', this)">👀 한눈에 보기</button>
                <button class="admin-tab-btn" onclick="switchAdminTab('tab-bystudent', this)">🧑‍🎓 학생별 보기</button>
            </aside>
            
            <main class="admin-content">

                    <div class="admin-card">

</div>

<script>
    /* ==========================================
       사운드 엔진 
    ========================================== */
    let audioCtx;
    function playSound(type) {
        try {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            const now = audioCtx.currentTime;

            if (type === 'drop') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(800, now); osc.frequency.exponentialRampToValueAtTime(1500, now + 0.1);
                gain.gain.setValueAtTime(0.3, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                osc.start(now); osc.stop(now + 0.1);
            } else if (type === 'delete') {
                osc.type = 'triangle'; osc.frequency.setValueAtTime(400, now); osc.frequency.exponentialRampToValueAtTime(200, now + 0.1);
                gain.gain.setValueAtTime(0.2, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                osc.start(now); osc.stop(now + 0.1);
            } else if (type === 'error') {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(200, now); osc.frequency.setValueAtTime(150, now+0.1);
                gain.gain.setValueAtTime(0.2, now); gain.gain.linearRampToValueAtTime(0, now+0.2);
                osc.start(now); osc.stop(now+0.2);
            }
        } catch(e) {}
    }

    /* ==========================================
       데이터 상태 설정
    ========================================== */
    const EMOJIS = ["🐶","🐱","🐭","🐹","🐰","🦊","🐻","🐼","🐨","🐯","🦁","🐮","🐢","🐸","🐵","🐧","🐥","🐬","🦔","🦉"];
    const TASK_COLORS = ["#3b82f6", "#10b981", "#f59e0b", "#8b5cf6", "#ec4899", "#06b6d4"];
    const TASK_EMOJIS = ["📝", "📖", "🥛", "🧹", "🎨", "🏃‍♂️", "🎵", "🗣️", "💡", "💯", "🍎", "⏰", "🗑️", "🧽", "🪴", "🧩", "⚽", "🍽️", "💻", "🔬", "🖍️", "🎒", "🚌", "🪥", "🦷"];

    // 첫 화면 샘플: 학생 25명
    const defaultStudents = ["김민준","이서연","박지우","최예준","정윤아","강도윤","임하은","한주원","송지현","오민수","유진아","전진우","윤지호","박수아","이도현","김태희","정우진","최다은","강민지","조윤호","황서진","백도윤","권시연","송건우","이은지"];
    let students = JSON.parse(localStorage.getItem('db_students_final_v5')) || defaultStudents;
    
    // 첫 화면 샘플: 과제 3개
    let tasks = JSON.parse(localStorage.getItem('db_tasks_final_v5')) || [
        { id: 't1', title: '아침 독서 기록장', icon: '📖', color: TASK_COLORS[0] },
        { id: 't2', title: '우유 다 마시기', icon: '🥛', color: TASK_COLORS[1] },
        { id: 't3', title: '수학 익힘책 12쪽', icon: '✏️', color: TASK_COLORS[2] }
    ];
    
    // 첫 화면 샘플: 미리 제출된 내역 약간
    let completions = JSON.parse(localStorage.getItem('db_completions_final_v5')) || {
        't1': ['김민준', '박지우', '정윤아'],
        't2': ['이서연'],
        't3': []
    };

    function saveData() {
        localStorage.setItem('db_students_final_v5', JSON.stringify(students));
        localStorage.setItem('db_tasks_final_v5', JSON.stringify(tasks));
        localStorage.setItem('db_completions_final_v5', JSON.stringify(completions));
    }
    function getEmoji(idx) { return EMOJIS[idx % EMOJIS.length]; }

    /* ==========================================
       초기화
    ========================================== */
    function init() {
        tasks.forEach(t => { if (!completions[t.id]) completions[t.id] = []; });
        for (let tid in completions) { completions[tid] = completions[tid].filter(s => students.includes(s)); }
        
        renderUserView();
        initFloatingTimer();
        initFloatingRoster(); 
        initEmojiPicker(); 
        
        // 보드 가로 스크롤 (마우스 휠)
        const board = document.getElementById('taskGrid');
        board.addEventListener('wheel', (e) => { 
            if (e.deltaY !== 0) { e.preventDefault(); board.scrollLeft += e.deltaY; } 
        });
        
        // 하단 독바 가로 스크롤 (마우스 휠)
        const studentDock = document.getElementById('studentDock');
        studentDock.addEventListener('wheel', (e) => {
            const rosterEl = document.getElementById('floating-roster');
            if (rosterEl.getAttribute('data-position') === 'bottom') {
                if (e.deltaY !== 0) { e.preventDefault(); studentDock.scrollLeft += e.deltaY; }
            }
        });

        document.body.addEventListener('click', () => { try{ if(audioCtx) audioCtx.resume(); }catch(e){} }, {once: true});
    }

    function switchMode(mode) {
        const floatingRoster = document.getElementById('floating-roster');
        if(mode === 'admin') {
            const pwd = prompt("관리자 암호를 입력하세요 (기본: 0000)");
            if (pwd !== '0000') { alert("암호가 틀렸습니다."); return; }
            document.getElementById('user-view').style.display = 'none';
            document.getElementById('admin-view').style.display = 'flex';
            document.getElementById('btn-user').classList.remove('active');
            document.getElementById('btn-admin').classList.add('active');
            floatingRoster.style.display = 'none'; 
            renderAdminTasks(); renderAdminStudents(); renderAdminOverview(); renderAdminByStudent();
        } else {
            document.getElementById('user-view').style.display = 'flex';
            document.getElementById('admin-view').style.display = 'none';
            document.getElementById('btn-user').classList.add('active');
            document.getElementById('btn-admin').classList.remove('active');
            floatingRoster.style.display = 'flex'; 
            renderUserView();
        }
    }

    function switchAdminTab(tabId, btnEl) {
        document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.admin-tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        btnEl.classList.add('active');
        if(tabId === 'tab-overview') renderAdminOverview();
        if(tabId === 'tab-bystudent') renderAdminByStudent();
    }

    /* ==========================================
       이모지 픽커 
    ========================================== */
    function initEmojiPicker() {
        const picker = document.getElementById('emojiPicker');
        picker.innerHTML = TASK_EMOJIS.map(e => `<div class="emoji-option" onclick="selectEmoji('${e}')">${e}</div>`).join('');
        document.addEventListener('click', (e) => {
            const container = e.target.closest('.emoji-picker-container');
            if(!container) {
                const pickerEl = document.getElementById('emojiPicker');
                if(pickerEl && pickerEl.classList.contains('show')) { pickerEl.classList.remove('show'); }
            }
        });
    }
    function toggleEmojiPicker() { document.getElementById('emojiPicker').classList.toggle('show'); }
    function selectEmoji(emoji) { document.getElementById('emojiSelectorBtn').textContent = emoji; document.getElementById('emojiPicker').classList.remove('show'); }

    /* ==========================================
       USER VIEW 렌더링
    ========================================== */
    function renderUserView() {
        const grid = document.getElementById('taskGrid');
        grid.setAttribute('data-count', tasks.length); 
        grid.innerHTML = '';

        tasks.forEach(task => {
            const completedCount = completions[task.id].length;
            const totalCount = students.length;
            const pct = totalCount ? (completedCount / totalCount) : 0;
            const dashArray = 2 * Math.PI * 18;

            const col = document.createElement('div');
            col.className = 'task-col';
            col.id = `task-col-${task.id}`;
            col.setAttribute('data-task-id', task.id);

            col.innerHTML = `
                <div class="task-header">
                    <div class="task-icon" style="background:${task.color}15; color:${task.color}">${task.icon}</div>
                    <div class="task-info">
                        <h3 class="task-title">${task.title}</h3>
                    </div>
                    <div class="progress-wrap">
                        <svg class="progress-svg" viewBox="0 0 44 44">
                            <circle class="progress-bg" cx="22" cy="22" r="18"></circle>
                            <circle class="progress-fill" cx="22" cy="22" r="18" stroke="${task.color}" stroke-dasharray="${dashArray}" stroke-dashoffset="${dashArray * (1 - pct)}"></circle>
                        </svg>
                        <div class="progress-text">${completedCount}</div>
                    </div>
                </div>
                <div class="task-body" id="task-body-${task.id}">
                    ${completions[task.id].map(name => {
                        const sIdx = students.indexOf(name);
                        return `<div class="done-chip" onclick="removeCompletion('${task.id}', '${name}')">
                            <span class="done-emoji">${getEmoji(sIdx)}</span>
                            <span class="done-name">${name}</span>
                        </div>`;
                    }).join('')}
                </div>
                <canvas class="confetti-canvas" id="canvas-${task.id}"></canvas>
            `;
            grid.appendChild(col);
        });

        renderDock();
    }

    function renderDock() {
        const dock = document.getElementById('studentDock');
        dock.innerHTML = '';
        document.getElementById('totalStudentsCount').textContent = `${students.length}명`;

        students.forEach((name, idx) => {
            const chip = document.createElement('div');
            chip.className = 'dock-chip';
            chip.innerHTML = `<span class="dock-emoji">${getEmoji(idx)}</span> <span class="dock-name">${name}</span>`;
            chip.addEventListener('pointerdown', (e) => startDrag(e, name, idx, chip));
            dock.appendChild(chip);
        });
    }

    /* ==========================================
       Mac OS Dock (플로팅 위치 및 스냅 계산)
    ========================================== */
    function initFloatingRoster() {
        const rosterEl = document.getElementById('floating-roster');
        const handle = document.getElementById('roster-drag-handle');
        let isDragging = false, offsetX, offsetY;

        handle.addEventListener('pointerdown', (e) => {
            isDragging = true;
            rosterEl.classList.add('dragging');
            const rect = rosterEl.getBoundingClientRect();
            
            // 기존 속성 해제
            rosterEl.removeAttribute('data-position');
            rosterEl.style.left = rect.left + 'px';
            rosterEl.style.top = rect.top + 'px';
            rosterEl.style.right = 'auto';
            rosterEl.style.bottom = 'auto';
            rosterEl.style.transform = 'none';
            
            offsetX = e.clientX - rect.left; 
            offsetY = e.clientY - rect.top;
            
            document.addEventListener('pointermove', onMove, {passive: false});
            document.addEventListener('pointerup', onUp);
        });

        function onMove(e) {
            if(!isDragging) return;
            e.preventDefault();
            rosterEl.style.left = (e.clientX - offsetX) + 'px';
            rosterEl.style.top = (e.clientY - offsetY) + 'px';
        }
        
        function onUp(e) { 
            isDragging = false; 
            rosterEl.classList.remove('dragging');
            document.removeEventListener('pointermove', onMove); 
            document.removeEventListener('pointerup', onUp); 
            
            const rect = rosterEl.getBoundingClientRect();
            const cy = rect.top + rect.height / 2;
            const cx = rect.left + rect.width / 2;
            const ww = window.innerWidth;
            const wh = window.innerHeight;

            rosterEl.style.left = ''; rosterEl.style.top = '';
            rosterEl.style.right = ''; rosterEl.style.bottom = '';
            rosterEl.style.transform = '';

            // 가장자리에 따른 스마트 스냅
            if (cy > wh * 0.7) {
                rosterEl.setAttribute('data-position', 'bottom');
                rosterEl.style.left = '50%'; rosterEl.style.bottom = '30px'; rosterEl.style.transform = 'translateX(-50%)';
            } else if (cx < ww * 0.35) {
                rosterEl.setAttribute('data-position', 'left');
                rosterEl.style.left = '30px'; rosterEl.style.top = '50%'; rosterEl.style.transform = 'translateY(-50%)';
            } else if (cx > ww * 0.65) {
                rosterEl.setAttribute('data-position', 'right');
                rosterEl.style.right = '30px'; rosterEl.style.top = '50%'; rosterEl.style.transform = 'translateY(-50%)';
            } else {
                rosterEl.setAttribute('data-position', 'bottom');
                rosterEl.style.left = '50%'; rosterEl.style.bottom = '30px'; rosterEl.style.transform = 'translateX(-50%)';
            }
        }
    }

    /* ==========================================
       드래그 앤 드롭 구현
    ========================================== */
    let ghost = null, dragStudentName = null, currentHoverCol = null;

    function startDrag(e, name, idx, sourceEl) {
        e.preventDefault(); dragStudentName = name;
        
        ghost = document.createElement('div');
        ghost.className = 'ghost-chip';
        ghost.innerHTML = `<span class="dock-emoji">${getEmoji(idx)}</span> <span class="dock-name">${name}</span>`;
        document.body.appendChild(ghost);
        
        moveGhost(e);
        document.addEventListener('pointermove', onDragMove, {passive: false});
        document.addEventListener('pointerup', onDragEnd);
    }

    function moveGhost(e) {
        if(!ghost) return;
        const x = e.clientX || (e.touches && e.touches[0].clientX);
        const y = e.clientY || (e.touches && e.touches[0].clientY);
        ghost.style.left = x + 'px'; ghost.style.top = y + 'px';
    }

    function onDragMove(e) {
        e.preventDefault(); moveGhost(e);
        const x = e.clientX || (e.touches && e.touches[0].clientX);
        const y = e.clientY || (e.touches && e.touches[0].clientY);
        
        ghost.style.display = 'none'; 
        const elemBelow = document.elementFromPoint(x, y);
        ghost.style.display = 'flex';
        
        const colBelow = elemBelow ? elemBelow.closest('.task-col') : null;
        
        if (currentHoverCol !== colBelow) {
            if (currentHoverCol) currentHoverCol.classList.remove('drag-over');
            if (colBelow) colBelow.classList.add('drag-over');
            currentHoverCol = colBelow;
        }
    }

    function onDragEnd(e) {
        document.removeEventListener('pointermove', onDragMove); document.removeEventListener('pointerup', onDragEnd);
        if (ghost) { ghost.remove(); ghost = null; }
        if (currentHoverCol) {
            currentHoverCol.classList.remove('drag-over');
            const taskId = currentHoverCol.getAttribute('data-task-id');
            handleDrop(taskId, dragStudentName);
            currentHoverCol = null;
        }
        dragStudentName = null;
    }

    function handleDrop(taskId, studentName) {
        if (!completions[taskId]) completions[taskId] = [];
        if (completions[taskId].includes(studentName)) { playSound('error'); return; }
        
        completions[taskId].push(studentName);
        saveData(); playSound('drop'); fireConfetti(taskId); renderUserView();
    }

    function removeCompletion(taskId, studentName) {
        if(confirm(`${studentName} 학생의 기록을 취소할까요?`)) {
            completions[taskId] = completions[taskId].filter(n => n !== studentName);
            saveData(); playSound('delete'); renderUserView();
        }
    }

    /* ==========================================
       폭죽 효과
    ========================================== */
    function fireConfetti(taskId) {
        const canvas = document.getElementById(`canvas-${taskId}`);
        if(!canvas) return;
        const ctx = canvas.getContext('2d');
        canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight;
        
        const particles = [];
        const colors = ['#f59e0b', '#10b981', '#3b82f6', '#ec4899', '#8b5cf6'];
        
        for(let i=0; i<40; i++) {
            particles.push({
                x: canvas.width / 2, y: canvas.height - 20, r: Math.random() * 5 + 3,
                dx: Math.random() * 12 - 6, dy: Math.random() * -12 - 5,
                color: colors[Math.floor(Math.random() * colors.length)]
            });
        }
        
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            let active = false;
            particles.forEach(p => {
                p.x += p.dx; p.y += p.dy; p.dy += 0.5; 
                if(p.y < canvas.height) active = true;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
                ctx.fillStyle = p.color; ctx.fill();
            });
            if(active) requestAnimationFrame(animate); else ctx.clearRect(0,0,canvas.width,canvas.height);
        }
        animate();
    }

    /* ==========================================
       플로팅 자유 타이머
    ========================================== */
    let totalSeconds = 20 * 60, timeRemaining = totalSeconds, timerInterval = null, isPlaying = false;
    
    function initFloatingTimer() {
        const timerEl = document.getElementById('floating-timer');
        const handle = document.getElementById('timer-drag-handle');
        let isDragging = false, offsetX, offsetY;

        handle.addEventListener('pointerdown', (e) => {
            isDragging = true;
            timerEl.classList.add('dragging');
            const rect = timerEl.getBoundingClientRect();
            
            timerEl.style.transform = 'none';
            timerEl.style.left = rect.left + 'px';
            timerEl.style.top = rect.top + 'px';
            
            offsetX = e.clientX - rect.left; offsetY = e.clientY - rect.top;
            document.addEventListener('pointermove', onMove, {passive: false});
            document.addEventListener('pointerup', onUp);
        });

        function onMove(e) {
            if(!isDragging) return;
            e.preventDefault();
            timerEl.style.left = (e.clientX - offsetX) + 'px';
            timerEl.style.top = (e.clientY - offsetY) + 'px';
        }
        function onUp() { 
            isDragging = false; 
            timerEl.classList.remove('dragging');
            document.removeEventListener('pointermove', onMove); 
            document.removeEventListener('pointerup', onUp); 
        }
        updateTimerDisplay();
    }

    function updateTimerDisplay() {
        const m = String(Math.floor(timeRemaining / 60)).padStart(2, '0');
        const s = String(timeRemaining % 60).padStart(2, '0');
        const display = document.getElementById('timeDisplay');
        display.textContent = `${m}:${s}`;
        display.classList.toggle('warning', timeRemaining <= 60 && timeRemaining > 0);
    }
    function setTimeManually() {
        if(isPlaying) toggleTimer();
        const input = prompt("설정할 시간을 분 단위로 입력하세요 (예: 15)", Math.floor(timeRemaining / 60));
        if (input && !isNaN(input) && parseInt(input) > 0) { timeRemaining = parseInt(input) * 60; updateTimerDisplay(); }
    }
    function adjustTime(min) { timeRemaining = Math.max(0, timeRemaining + min * 60); updateTimerDisplay(); }
    function toggleTimer() {
        const iconPlay = document.getElementById('icon-play'), iconPause = document.getElementById('icon-pause');
        if (isPlaying) {
            clearInterval(timerInterval); iconPlay.style.display = 'block'; iconPause.style.display = 'none';
        } else {
            if (timeRemaining <= 0) return;
            timerInterval = setInterval(() => {
                timeRemaining--; updateTimerDisplay();
                if (timeRemaining <= 0) {
                    clearInterval(timerInterval); isPlaying = false;
                    iconPlay.style.display = 'block'; iconPause.style.display = 'none';
                    playSound('alert'); setTimeout(() => alert("⏰ 시간이 종료되었습니다!"), 100);
                }
            }, 1000);
            iconPlay.style.display = 'none'; iconPause.style.display = 'block';
        }
        isPlaying = !isPlaying;
    }
    function resetTimer() {
        clearInterval(timerInterval); isPlaying = false;
        document.getElementById('icon-play').style.display = 'block'; document.getElementById('icon-pause').style.display = 'none';
        timeRemaining = 20 * 60; updateTimerDisplay();
    }

    /* ==========================================
       ADMIN VIEW 렌더링
    ========================================== */
    function renderAdminTasks() {
        const list = document.getElementById('adminTaskList');
        list.innerHTML = tasks.map(t => `
            <div class="task-edit-item">
                <span class="icon-input">${t.icon}</span>
                <span style="flex-grow:1; font-weight:700; font-size:1.05rem;">${t.title}</span>
                <button class="btn-danger-sm" onclick="removeTask('${t.id}')" title="삭제">✕</button>
            </div>
        `).join('');
    }
    function addTask() {
        const title = document.getElementById('newTaskTitle').value.trim();
        const icon = document.getElementById('emojiSelectorBtn').textContent.trim() || '📝';
        if(tasks.length >= 6) { alert("과제는 최대 6개까지만 설정할 수 있습니다."); return; }
        if(title) {
            const newId = 't' + Date.now();
            tasks.push({ id: newId, title, icon, color: TASK_COLORS[tasks.length % TASK_COLORS.length] });
            completions[newId] = []; document.getElementById('newTaskTitle').value = '';
            saveData(); renderAdminTasks();
        }
    }
    function removeTask(id) {
        if(confirm("정말 이 과제를 삭제하시겠습니까?")) {
            tasks = tasks.filter(t => t.id !== id); delete completions[id];
            saveData(); renderAdminTasks();
        }
    }
    function resetAllCompletions() {
        if(confirm("모든 학생의 제출 기록을 초기화하시겠습니까? (과제 목록은 유지됩니다)")) {
            tasks.forEach(t => completions[t.id] = []);
            saveData(); alert("기록 초기화 완료!"); renderAdminOverview(); renderAdminByStudent();
        }
    }

    function renderAdminStudents() {
        const list = document.getElementById('adminStudentList');
        list.innerHTML = students.map((name, idx) => `
            <div style="background:var(--paper); border:1px solid var(--border); padding:8px 14px; border-radius:100px; font-weight:700; font-size:0.95rem; display:flex; align-items:center; gap:8px;">
                ${getEmoji(idx)} ${name} <span style="color:var(--accent); cursor:pointer; margin-left:4px;" onclick="removeStudent(${idx})">✕</span>
            </div>
        `).join('');
    }
    function addStudent() {
        const input = document.getElementById('newStudentName'), name = input.value.trim();
        if(name) { students.push(name); input.value = ''; saveData(); renderAdminStudents(); }
    }
    function removeStudent(idx) {
        if(confirm("이 학생을 명단에서 삭제할까요?")) {
            const name = students[idx]; students.splice(idx, 1);
            for(let tid in completions) completions[tid] = completions[tid].filter(s => s !== name);
            saveData(); renderAdminStudents();
        }
    }

    function renderAdminOverview() {
        const container = document.getElementById('adminOverviewContent');
        container.innerHTML = tasks.map(task => {
            const done = completions[task.id];
            const missing = students.filter(s => !done.includes(s));
            return `
                <div class="insight-box">
                    <div class="insight-header">${task.icon} ${task.title}</div>
                    <div class="status-section">
                        <div class="status-title" style="color:var(--success)">✅ 제출완료 (${done.length}명)</div>
                        <div class="chip-wrap">${done.length ? done.map(s => `<span class="chip done">${s}</span>`).join('') : '<span style="color:var(--ink-light)">아직 제출자가 없습니다.</span>'}</div>
                    </div>
                    <div class="status-section">
                        <div class="status-title" style="color:var(--accent)">🚨 미제출 (${missing.length}명)</div>
                        <div class="chip-wrap">${missing.length ? missing.map(s => `<span class="chip missing">${s}</span>`).join('') : '<span style="color:var(--success); font-weight:bold;">🎉 전원 제출 완료!</span>'}</div>
                    </div>
                </div>
            `;
        }).join('');
    }

    function renderAdminByStudent() {
        const container = document.getElementById('adminByStudentContent');
        container.innerHTML = students.map((student, idx) => {
            const taskBadges = tasks.map(task => {
                const isDone = completions[task.id].includes(student);
                return `<span class="badge ${isDone ? 'done' : 'missing'}">
                            ${task.icon} <span>${task.title}</span> 
                            <strong style="margin-left:4px;">${isDone ? 'O' : 'X'}</strong>
                        </span>`;
            }).join('');
            return `<tr>
                <td style="font-weight:800; font-size:1.1rem; color:var(--ink);">${getEmoji(idx)} ${student}</td>
                <td>${taskBadges}</td>
            </tr>`;
        }).join('');
    }

    window.onload = init;
</script>
</body>
</html>
